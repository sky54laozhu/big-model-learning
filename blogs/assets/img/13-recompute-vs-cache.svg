<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 330" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t d">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t">朴素重算 vs KV Cache</title>
  <desc id="d">左侧朴素做法：生成第N个token要把前面N个token的K/V全部重算一遍，越往后越慢，复杂度O(N)。右侧KV Cache：前面token的K/V存进缓存直接取，每步只算新token这一个，每步恒定O(1)。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 18px; }
    .stage-label { fill: #ffffff; font-weight: 600; font-size: 14px; text-anchor: middle; }
    .cell { font-size: 12px; text-anchor: middle; }
    .recompute { fill: #b91c1c; }
    .cached { fill: #166534; }
    .newt { fill: #1e40af; }
    .note { fill: #6b7280; font-size: 12px; text-anchor: middle; }
  </style>

  <text x="440" y="30" class="h">同一个值反复重算 → 缓存它</text>

  <!-- 左：朴素重算 -->
  <rect x="36" y="54" width="396" height="240" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="36" y="54" width="396" height="30" rx="8" fill="#991b1b"/>
  <rect x="36" y="70" width="396" height="14" fill="#991b1b"/>
  <text x="234" y="74" class="stage-label">朴素：每步全重算 · O(N)</text>

  <!-- rows: each step recompute all -->
  <g>
    <text x="58" y="110" class="cell" text-anchor="start" fill="#6b7280">生成第2个</text>
    <rect x="150" y="100" width="22" height="16" rx="3" class="recompute" fill="#fecaca"/><text x="161" y="112" class="cell recompute">1</text>
    <rect x="176" y="100" width="22" height="16" rx="3" fill="#dbeafe"/><text x="187" y="112" class="cell newt">2</text>

    <text x="58" y="140" class="cell" text-anchor="start" fill="#6b7280">生成第3个</text>
    <rect x="150" y="130" width="22" height="16" rx="3" fill="#fecaca"/><text x="161" y="142" class="cell recompute">1</text>
    <rect x="176" y="130" width="22" height="16" rx="3" fill="#fecaca"/><text x="187" y="142" class="cell recompute">2</text>
    <rect x="202" y="130" width="22" height="16" rx="3" fill="#dbeafe"/><text x="213" y="142" class="cell newt">3</text>

    <text x="58" y="170" class="cell" text-anchor="start" fill="#6b7280">生成第4个</text>
    <rect x="150" y="160" width="22" height="16" rx="3" fill="#fecaca"/><text x="161" y="172" class="cell recompute">1</text>
    <rect x="176" y="160" width="22" height="16" rx="3" fill="#fecaca"/><text x="187" y="172" class="cell recompute">2</text>
    <rect x="202" y="160" width="22" height="16" rx="3" fill="#fecaca"/><text x="213" y="172" class="cell recompute">3</text>
    <rect x="228" y="160" width="22" height="16" rx="3" fill="#dbeafe"/><text x="239" y="172" class="cell newt">4</text>

    <text x="58" y="200" class="cell" text-anchor="start" fill="#6b7280">⋮</text>
    <text x="58" y="230" class="cell" text-anchor="start" fill="#6b7280">生成第100个</text>
    <rect x="150" y="220" width="180" height="16" rx="3" fill="#fecaca"/><text x="240" y="232" class="cell recompute">重算前 99 个的 K/V</text>
    <rect x="334" y="220" width="22" height="16" rx="3" fill="#dbeafe"/><text x="345" y="232" class="cell newt">100</text>
  </g>
  <text x="234" y="266" class="note recompute" font-weight="700">红=重算（上一步明明算过）</text>
  <text x="234" y="284" class="note">越往后越慢，做的全是重复功</text>

  <!-- 右：KV Cache -->
  <rect x="448" y="54" width="396" height="240" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="448" y="54" width="396" height="30" rx="8" fill="#166534"/>
  <rect x="448" y="70" width="396" height="14" fill="#166534"/>
  <text x="646" y="74" class="stage-label">KV Cache：只算新的 · O(1)</text>

  <g>
    <text x="470" y="110" class="cell" text-anchor="start" fill="#6b7280">生成第2个</text>
    <rect x="562" y="100" width="22" height="16" rx="3" fill="#bbf7d0"/><text x="573" y="112" class="cell cached">1</text>
    <rect x="588" y="100" width="22" height="16" rx="3" fill="#dbeafe"/><text x="599" y="112" class="cell newt">2</text>

    <text x="470" y="140" class="cell" text-anchor="start" fill="#6b7280">生成第3个</text>
    <rect x="562" y="130" width="22" height="16" rx="3" fill="#bbf7d0"/><text x="573" y="142" class="cell cached">1</text>
    <rect x="588" y="130" width="22" height="16" rx="3" fill="#bbf7d0"/><text x="599" y="142" class="cell cached">2</text>
    <rect x="614" y="130" width="22" height="16" rx="3" fill="#dbeafe"/><text x="625" y="142" class="cell newt">3</text>

    <text x="470" y="170" class="cell" text-anchor="start" fill="#6b7280">生成第4个</text>
    <rect x="562" y="160" width="22" height="16" rx="3" fill="#bbf7d0"/><text x="573" y="172" class="cell cached">1</text>
    <rect x="588" y="160" width="22" height="16" rx="3" fill="#bbf7d0"/><text x="599" y="172" class="cell cached">2</text>
    <rect x="614" y="160" width="22" height="16" rx="3" fill="#bbf7d0"/><text x="625" y="172" class="cell cached">3</text>
    <rect x="640" y="160" width="22" height="16" rx="3" fill="#dbeafe"/><text x="651" y="172" class="cell newt">4</text>

    <text x="470" y="200" class="cell" text-anchor="start" fill="#6b7280">⋮</text>
    <text x="470" y="230" class="cell" text-anchor="start" fill="#6b7280">生成第100个</text>
    <rect x="562" y="220" width="180" height="16" rx="3" fill="#bbf7d0"/><text x="652" y="232" class="cell cached">前 99 个从缓存取</text>
    <rect x="746" y="220" width="22" height="16" rx="3" fill="#dbeafe"/><text x="757" y="232" class="cell newt">100</text>
  </g>
  <text x="646" y="266" class="note cached" font-weight="700">绿=缓存命中（不算）　蓝=只算这 1 个新的</text>
  <text x="646" y="284" class="note">每步恒定，长回答也能哗哗流</text>
</svg>
