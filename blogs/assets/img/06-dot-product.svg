<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t2 d2">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t2">点积：衡量方向一致性</title>
  <desc id="d2">点积通过逐项相乘再求和来衡量两个向量的方向是否一致。同号贡献正，异号贡献负。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .box { rx: 8; }
    .label { font-size: 12px; text-anchor: middle; }
    .label-b { font-size: 13px; text-anchor: middle; font-weight: 600; }
    .num { font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; }
    .sign-ok { fill: #16a34a; font-weight: 700; font-size: 12px; }
    .sign-bad { fill: #dc2626; font-weight: 700; font-size: 12px; }
  </style>

  <text x="390" y="30" class="h">点积：逐项相乘看正负</text>

  <!-- Vectors row -->
  <text x="120" y="62" class="label-b" fill="#6b7280">维度</text>
  <text x="250" y="62" class="label-b" fill="#1a1a1a">动物性</text>
  <text x="390" y="62" class="label-b" fill="#1a1a1a">可爱</text>
  <text x="530" y="62" class="label-b" fill="#1a1a1a">金融</text>

  <!-- Cat vector -->
  <rect x="30" y="74" width="120" height="30" class="box" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="94" class="label" fill="#1d4ed8">猫</text>
  <text x="250" y="94" class="num" fill="#1d4ed8" text-anchor="middle">+0.9</text>
  <text x="390" y="94" class="num" fill="#1d4ed8" text-anchor="middle">+0.8</text>
  <text x="530" y="94" class="num" fill="#1d4ed8" text-anchor="middle">-0.1</text>

  <!-- Dog vector -->
  <rect x="30" y="110" width="120" height="30" class="box" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="90" y="130" class="label" fill="#166534">狗</text>
  <text x="250" y="130" class="num" fill="#166534" text-anchor="middle">+0.8</text>
  <text x="390" y="130" class="num" fill="#166534" text-anchor="middle">+0.7</text>
  <text x="530" y="130" class="num" fill="#166534" text-anchor="middle">-0.2</text>

  <!-- Stock vector -->
  <rect x="30" y="146" width="120" height="30" class="box" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="90" y="166" class="label" fill="#92400e">股票</text>
  <text x="250" y="166" class="num" fill="#92400e" text-anchor="middle">-0.1</text>
  <text x="390" y="166" class="num" fill="#92400e" text-anchor="middle">-0.3</text>
  <text x="530" y="166" class="num" fill="#92400e" text-anchor="middle">+0.9</text>

  <!-- Separator -->
  <line x1="30" y1="194" x2="750" y2="194" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Cat · Dog calculation -->
  <rect x="30" y="210" width="340" height="140" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="200" y="234" class="label-b" fill="#166534">猫 · 狗 = ?</text>

  <text x="60" y="262" class="num" text-anchor="start" fill="#1a1a1a">+0.9 × +0.8 = +0.72</text>
  <text x="280" y="262" class="sign-ok" text-anchor="start">同号 ✓</text>

  <text x="60" y="284" class="num" text-anchor="start" fill="#1a1a1a">+0.8 × +0.7 = +0.56</text>
  <text x="280" y="284" class="sign-ok" text-anchor="start">同号 ✓</text>

  <text x="60" y="306" class="num" text-anchor="start" fill="#1a1a1a">-0.1 × -0.2 = +0.02</text>
  <text x="280" y="306" class="sign-ok" text-anchor="start">同号 ✓</text>

  <line x1="50" y1="316" x2="330" y2="316" stroke="#16a34a" stroke-width="1"/>
  <text x="200" y="338" fill="#166534" font-size="14" font-weight="700" text-anchor="middle">= 1.30 （相似！）</text>

  <!-- Cat · Stock calculation -->
  <rect x="410" y="210" width="340" height="140" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="580" y="234" class="label-b" fill="#991b1b">猫 · 股票 = ?</text>

  <text x="440" y="262" class="num" text-anchor="start" fill="#1a1a1a">+0.9 × -0.1 = -0.09</text>
  <text x="660" y="262" class="sign-bad" text-anchor="start">异号 ✗</text>

  <text x="440" y="284" class="num" text-anchor="start" fill="#1a1a1a">+0.8 × -0.3 = -0.24</text>
  <text x="660" y="284" class="sign-bad" text-anchor="start">异号 ✗</text>

  <text x="440" y="306" class="num" text-anchor="start" fill="#1a1a1a">-0.1 × +0.9 = -0.09</text>
  <text x="660" y="306" class="sign-bad" text-anchor="start">异号 ✗</text>

  <line x1="430" y1="316" x2="710" y2="316" stroke="#dc2626" stroke-width="1"/>
  <text x="580" y="338" fill="#991b1b" font-size="14" font-weight="700" text-anchor="middle">= -0.42 （不相似）</text>

  <!-- Bottom note -->
  <rect x="140" y="362" width="500" height="10" rx="2" fill="#fff"/>
</svg>
