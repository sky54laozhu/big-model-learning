<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t4 d4">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t4">Transformer 完整架构</title>
  <desc id="d4">完整的 Transformer 架构：从输入文字到输出概率的全流程。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .box { rx: 8; }
    .label { font-size: 13px; text-anchor: middle; }
    .label-b { font-size: 13px; text-anchor: middle; font-weight: 600; }
    .label-s { font-size: 11px; text-anchor: middle; }
    .arrow { fill: none; stroke: #5a5a5a; stroke-width: 1.5; marker-end: url(#mk); }
    .note { fill: #6b7280; font-size: 11px; }
    .step-num { fill: #fff; font-weight: 700; font-size: 13px; text-anchor: middle; }
  </style>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <text x="440" y="30" class="h">Transformer 完整架构：从输入到输出</text>

  <!-- Step 1: Input text -->
  <circle cx="60" cy="68" r="14" fill="#64748b"/>
  <text x="60" y="73" class="step-num">1</text>

  <rect x="90" y="50" width="700" height="36" class="box" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="440" y="73" class="label" fill="#475569">"从前有座山山上有座___"</text>
  <text x="810" y="73" class="note" text-anchor="end">输入文字</text>

  <path d="M440,86 L440,108" class="arrow"/>

  <!-- Step 2: Tokenization + Embedding -->
  <circle cx="60" cy="128" r="14" fill="#64748b"/>
  <text x="60" y="133" class="step-num">2</text>

  <rect x="90" y="110" width="340" height="36" class="box" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="260" y="133" class="label-b" fill="#1d4ed8">Tokenization + Embedding</text>

  <rect x="450" y="110" width="340" height="36" class="box" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="620" y="133" class="label-b" fill="#92400e">+ 位置编码</text>

  <text x="810" y="133" class="note" text-anchor="end">文字→向量</text>

  <path d="M440,146 L440,174" class="arrow"/>

  <!-- Step 3: Transformer layers block -->
  <circle cx="60" cy="194" r="14" fill="#64748b"/>
  <text x="60" y="199" class="step-num">3</text>

  <rect x="90" y="176" width="700" height="310" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="120" y="196" font-size="12" fill="#94a3b8" font-weight="600">× N 层（GPT-3 = 96 层）</text>

  <!-- Attention -->
  <rect x="180" y="210" width="520" height="44" class="box" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="440" y="237" class="label-b" fill="#6d28d9">Multi-Head Attention（沟通）</text>

  <path d="M440,254 L440,272" class="arrow"/>

  <!-- Add & Norm 1 -->
  <rect x="280" y="274" width="320" height="32" class="box" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="440" y="295" class="label" fill="#166534">Add（残差连接）&amp; LayerNorm（归一化）</text>

  <path d="M440,306 L440,328" class="arrow"/>

  <!-- FFN -->
  <rect x="180" y="330" width="520" height="44" class="box" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="440" y="357" class="label-b" fill="#92400e">FFN 前馈网络（消化）</text>

  <path d="M440,374 L440,392" class="arrow"/>

  <!-- Add & Norm 2 -->
  <rect x="280" y="394" width="320" height="32" class="box" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="440" y="415" class="label" fill="#166534">Add（残差连接）&amp; LayerNorm（归一化）</text>

  <!-- Skip connections illustrated -->
  <path d="M180,232 Q140,232 140,293 Q140,306 170,306" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5 3" fill="none"/>
  <path d="M180,352 Q140,352 140,413 Q140,428 170,428" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5 3" fill="none"/>

  <!-- Dots for "more layers" -->
  <text x="440" y="462" fill="#94a3b8" font-size="20" text-anchor="middle" letter-spacing="8">···</text>

  <path d="M440,476 L440,504" class="arrow"/>

  <!-- Step 4: Output layer -->
  <circle cx="60" cy="524" r="14" fill="#64748b"/>
  <text x="60" y="529" class="step-num">4</text>

  <rect x="90" y="506" width="340" height="36" class="box" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="260" y="529" class="label-b" fill="#be185d">输出层（W × 向量 + Softmax）</text>

  <rect x="450" y="506" width="340" height="36" class="box" fill="#16a34a"/>
  <text x="620" y="529" fill="#fff" font-weight="600" font-size="13" text-anchor="middle">概率：{ "庙": 96%, "楼": 2%, ... }</text>

  <text x="810" y="529" class="note" text-anchor="end">向量→概率</text>

  <!-- Bottom summary -->
  <rect x="170" y="560" width="540" height="28" rx="6" fill="#f0f9ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="440" y="579" fill="#1d4ed8" font-size="12" text-anchor="middle" font-weight="500">Transformer = Embedding + 位置编码 + (Attention + FFN + 残差 + Norm) × N + 输出层</text>
</svg>
