<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t3 d3">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t3">位置编码</title>
  <desc id="d3">位置编码：给每个 token 的 Embedding 向量加上位置向量，让模型知道谁在前谁在后。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .box { rx: 8; }
    .label { font-size: 12px; text-anchor: middle; }
    .label-b { font-size: 13px; text-anchor: middle; font-weight: 600; }
    .arrow { fill: none; stroke: #5a5a5a; stroke-width: 1.5; marker-end: url(#mk); }
    .note { fill: #6b7280; font-size: 11px; text-anchor: middle; }
    .num { font-family: 'SF Mono', 'Menlo', monospace; font-size: 11px; }
  </style>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <text x="390" y="32" class="h">位置编码：给每个 token 加上位置信息</text>

  <!-- Token labels -->
  <text x="170" y="65" class="label-b" fill="#1a1a1a">猫</text>
  <text x="390" y="65" class="label-b" fill="#1a1a1a">吃</text>
  <text x="610" y="65" class="label-b" fill="#1a1a1a">鱼</text>

  <!-- Embedding vectors -->
  <rect x="100" y="76" width="140" height="44" class="box" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="95" class="label" fill="#1d4ed8">Embedding 向量</text>
  <text x="170" y="112" class="num" fill="#3b82f6" text-anchor="middle">[0.2, -0.5, 0.8, ...]</text>

  <rect x="320" y="76" width="140" height="44" class="box" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="95" class="label" fill="#1d4ed8">Embedding 向量</text>
  <text x="390" y="112" class="num" fill="#3b82f6" text-anchor="middle">[0.7, 0.1, -0.3, ...]</text>

  <rect x="540" y="76" width="140" height="44" class="box" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="610" y="95" class="label" fill="#1d4ed8">Embedding 向量</text>
  <text x="610" y="112" class="num" fill="#3b82f6" text-anchor="middle">[0.4, 0.6, -0.1, ...]</text>

  <!-- Plus signs -->
  <text x="170" y="145" font-size="20" font-weight="700" fill="#16a34a" text-anchor="middle">+</text>
  <text x="390" y="145" font-size="20" font-weight="700" fill="#16a34a" text-anchor="middle">+</text>
  <text x="610" y="145" font-size="20" font-weight="700" fill="#16a34a" text-anchor="middle">+</text>

  <!-- Position vectors -->
  <rect x="100" y="156" width="140" height="44" class="box" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="170" y="175" class="label" fill="#92400e">位置向量 #1</text>
  <text x="170" y="192" class="num" fill="#d97706" text-anchor="middle">[0.0, 1.0, 0.0, ...]</text>

  <rect x="320" y="156" width="140" height="44" class="box" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="390" y="175" class="label" fill="#92400e">位置向量 #2</text>
  <text x="390" y="192" class="num" fill="#d97706" text-anchor="middle">[0.8, 0.6, 0.1, ...]</text>

  <rect x="540" y="156" width="140" height="44" class="box" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="610" y="175" class="label" fill="#92400e">位置向量 #3</text>
  <text x="610" y="192" class="num" fill="#d97706" text-anchor="middle">[0.9, -0.4, 0.5, ...]</text>

  <!-- Arrows down -->
  <path d="M170,200 L170,230" class="arrow"/>
  <path d="M390,200 L390,230" class="arrow"/>
  <path d="M610,200 L610,230" class="arrow"/>

  <!-- Result vectors -->
  <rect x="100" y="232" width="140" height="44" class="box" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="170" y="251" class="label" fill="#6d28d9">实际输入向量</text>
  <text x="170" y="268" class="num" fill="#8b5cf6" text-anchor="middle">[0.2, 0.5, 0.8, ...]</text>

  <rect x="320" y="232" width="140" height="44" class="box" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="390" y="251" class="label" fill="#6d28d9">实际输入向量</text>
  <text x="390" y="268" class="num" fill="#8b5cf6" text-anchor="middle">[1.5, 0.7, -0.2, ...]</text>

  <rect x="540" y="232" width="140" height="44" class="box" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="610" y="251" class="label" fill="#6d28d9">实际输入向量</text>
  <text x="610" y="268" class="num" fill="#8b5cf6" text-anchor="middle">[1.3, 0.2, 0.4, ...]</text>

  <!-- Bottom note -->
  <rect x="130" y="300" width="520" height="44" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
  <text x="390" y="319" fill="#854d0e" font-size="12" text-anchor="middle" font-weight="500">同一个字在不同位置 → 加上不同的位置向量 → 得到不同的输入</text>
  <text x="390" y="336" fill="#92400e" font-size="11" text-anchor="middle">"猫吃鱼"和"鱼吃猫"中的"猫"，因位置不同而得到不同的向量</text>
</svg>
