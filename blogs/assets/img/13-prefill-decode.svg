<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t d">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t">Prefill 与 Decode 两阶段</title>
  <desc id="d">生成分两阶段。预填充 Prefill 把整个 prompt 一次跑完算出全部 K/V 灌进缓存，正比于 prompt 长度，慢，这就是首 token 延迟 TTFT。解码 Decode 之后每步只生成一个 token，工作量恒定，快，哗哗地流。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 18px; }
    .stage-label { fill: #ffffff; font-weight: 700; font-size: 14px; text-anchor: middle; }
    .tok { font-size: 12px; text-anchor: middle; }
    .note { fill: #6b7280; font-size: 12px; text-anchor: middle; }
  </style>

  <text x="440" y="30" class="h">生成的两阶段：Prefill 慢，Decode 快</text>

  <!-- Prefill -->
  <rect x="36" y="54" width="300" height="208" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="36" y="54" width="300" height="30" rx="8" fill="#991b1b"/>
  <rect x="36" y="70" width="300" height="14" fill="#991b1b"/>
  <text x="186" y="74" class="stage-label">① Prefill 预填充 · 慢</text>

  <text x="186" y="106" class="note">整个 prompt（500 token）一次跑完</text>
  <!-- prompt tokens block -->
  <g>
    <rect x="60" y="120" width="22" height="18" rx="3" fill="#fecaca"/>
    <rect x="86" y="120" width="22" height="18" rx="3" fill="#fecaca"/>
    <rect x="112" y="120" width="22" height="18" rx="3" fill="#fecaca"/>
    <rect x="138" y="120" width="22" height="18" rx="3" fill="#fecaca"/>
    <rect x="164" y="120" width="22" height="18" rx="3" fill="#fecaca"/>
    <rect x="190" y="120" width="22" height="18" rx="3" fill="#fecaca"/>
    <rect x="216" y="120" width="22" height="18" rx="3" fill="#fecaca"/>
    <rect x="242" y="120" width="22" height="18" rx="3" fill="#fecaca"/>
    <rect x="268" y="120" width="22" height="18" rx="3" fill="#fecaca"/>
    <rect x="294" y="120" width="18" height="18" rx="3" fill="#fecaca"/>
  </g>
  <text x="186" y="158" class="note">↓ 一次性算出全部 K/V</text>
  <rect x="60" y="166" width="252" height="22" rx="4" fill="#fee2e2" stroke="#dc2626"/>
  <text x="186" y="181" class="tok" fill="#991b1b" font-weight="700">灌满 KV Cache</text>
  <text x="186" y="214" class="note" font-weight="700" fill="#991b1b">工作量 ∝ prompt 长度</text>
  <text x="186" y="236" class="note">问得越长，首 token 等得越久</text>
  <text x="186" y="254" class="tok" fill="#991b1b" font-weight="700">= TTFT（首 token 延迟）</text>

  <!-- 箭头 -->
  <line x1="340" y1="158" x2="392" y2="158" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#mk)"/>
  <text x="366" y="148" class="note">吐第1个</text>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <!-- Decode -->
  <rect x="400" y="54" width="444" height="208" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="400" y="54" width="444" height="30" rx="8" fill="#166534"/>
  <rect x="400" y="70" width="444" height="14" fill="#166534"/>
  <text x="622" y="74" class="stage-label">② Decode 解码 · 快</text>

  <text x="622" y="106" class="note">之后每步只生成 1 个 token</text>
  <g>
    <rect x="430" y="124" width="40" height="22" rx="4" fill="#dcfce7" stroke="#16a34a"/><text x="450" y="139" class="tok" fill="#166534">tok1</text>
    <text x="480" y="139" class="tok" fill="#6b7280">→</text>
    <rect x="492" y="124" width="40" height="22" rx="4" fill="#dcfce7" stroke="#16a34a"/><text x="512" y="139" class="tok" fill="#166534">tok2</text>
    <text x="542" y="139" class="tok" fill="#6b7280">→</text>
    <rect x="554" y="124" width="40" height="22" rx="4" fill="#dcfce7" stroke="#16a34a"/><text x="574" y="139" class="tok" fill="#166534">tok3</text>
    <text x="604" y="139" class="tok" fill="#6b7280">→</text>
    <rect x="616" y="124" width="40" height="22" rx="4" fill="#dcfce7" stroke="#16a34a"/><text x="636" y="139" class="tok" fill="#166534">tok4</text>
    <text x="666" y="139" class="tok" fill="#6b7280">→ …</text>
  </g>
  <text x="622" y="176" class="note">每步只算这 1 个的 K/V，追加进缓存</text>
  <text x="622" y="214" class="note" font-weight="700" fill="#166534">工作量恒定（与已生成长度几乎无关）</text>
  <text x="622" y="236" class="note">所以一旦开始，就哗哗地流</text>
  <text x="622" y="254" class="tok" fill="#166534" font-weight="700">= 流式输出（打字机效果）</text>
</svg>
