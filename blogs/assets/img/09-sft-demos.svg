<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t d">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t">监督微调：补一批服从示范，喂进老训练循环</title>
  <desc id="d">把一摞「指令到回答」的示范卡片，喂进 Blog 03 的四步训练循环（前向、算损失、反向、更新）继续训练。模型由此学会新模式：看到指令 X 就产出有帮助的回答 Y。知识与推理在预训练早已具备，这一步只补行为。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 17px; }
    .note { fill: #6b7280; font-size: 12px; }
    .stage-label { fill: #ffffff; font-weight: 600; font-size: 13px; }
    .colhint { font-size: 11.5px; }
    .ins { fill: #1e40af; font-weight: 600; font-size: 11.5px; }
    .ans { fill: #2a2a2a; font-size: 11.5px; }
    .mut { fill: #6b7280; font-size: 11.5px; }
    .step { fill: #1a2233; font-size: 12px; }
    .arrow { fill: none; stroke: #5a5a5a; stroke-width: 1.6; marker-end: url(#mk); }
  </style>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <text x="440" y="30" class="h">缺“服从”示范？那就补“服从”示范</text>

  <!-- 左栏：示范卡片堆 -->
  <rect x="24" y="52" width="288" height="296" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.6"/>
  <path d="M24,62 a10,10 0 0 1 10,-10 h268 a10,10 0 0 1 10,10 v16 h-288 z" fill="#1e40af"/>
  <rect x="24" y="68" width="288" height="10" fill="#1e40af"/>
  <text x="40" y="71" class="stage-label">一摞「指令 → 回答」示范</text>

  <!-- 卡片 1 -->
  <rect x="40" y="92" width="256" height="74" rx="7" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.4"/>
  <text x="52" y="111" class="ins">指令：帮我写一封辞职信</text>
  <text x="52" y="131" class="ans">回答：尊敬的领导：……特此</text>
  <text x="52" y="149" class="ans">辞职，望批准。此致敬礼</text>

  <!-- 卡片 2 -->
  <rect x="40" y="174" width="256" height="74" rx="7" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.4"/>
  <text x="52" y="193" class="ins">指令：把“今天天气真好”译成英文</text>
  <text x="52" y="213" class="ans">回答：The weather is</text>
  <text x="52" y="231" class="ans">really nice today.</text>

  <!-- 卡片 3 -->
  <rect x="40" y="256" width="256" height="74" rx="7" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.4"/>
  <text x="52" y="275" class="ins">指令：解释什么是递归</text>
  <text x="52" y="295" class="ans">回答：一个函数调用自己，</text>
  <text x="52" y="313" class="ans">直到触达终止条件……</text>

  <!-- 左 → 中 箭头 -->
  <path class="arrow" d="M316,200 L344,200"/>

  <!-- 中栏：四步循环 -->
  <rect x="348" y="86" width="200" height="228" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.6"/>
  <path d="M348,96 a10,10 0 0 1 10,-10 h180 a10,10 0 0 1 10,10 v16 h-200 z" fill="#92400e"/>
  <rect x="348" y="102" width="200" height="10" fill="#92400e"/>
  <text x="364" y="105" class="stage-label">Blog 03 四步循环</text>
  <text x="448" y="132" text-anchor="middle" fill="#92400e" font-weight="600" font-size="11.5">继续训练（同一套循环）</text>

  <rect x="372" y="146" width="152" height="34" rx="6" fill="#ffffff" stroke="#fcd34d" stroke-width="1.4"/>
  <text x="448" y="167" text-anchor="middle" class="step">① 前向 预测下一个 token</text>
  <rect x="372" y="190" width="152" height="34" rx="6" fill="#ffffff" stroke="#fcd34d" stroke-width="1.4"/>
  <text x="448" y="211" text-anchor="middle" class="step">② 算损失 与示范比对</text>
  <rect x="372" y="234" width="152" height="34" rx="6" fill="#ffffff" stroke="#fcd34d" stroke-width="1.4"/>
  <text x="448" y="255" text-anchor="middle" class="step">③ 反向 求梯度</text>
  <rect x="372" y="278" width="152" height="26" rx="6" fill="#ffffff" stroke="#fcd34d" stroke-width="1.4"/>
  <text x="448" y="295" text-anchor="middle" class="step">④ 更新 微调权重</text>

  <!-- 中 → 右 箭头 -->
  <path class="arrow" d="M552,200 L580,200"/>

  <!-- 右栏：结果框 -->
  <rect x="584" y="86" width="272" height="228" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/>
  <path d="M584,96 a10,10 0 0 1 10,-10 h252 a10,10 0 0 1 10,10 v16 h-272 z" fill="#166534"/>
  <rect x="584" y="102" width="272" height="10" fill="#166534"/>
  <text x="600" y="105" class="stage-label">模型学会的新模式</text>

  <text x="600" y="138" fill="#166534" font-weight="600" font-size="12">看到 → 产出，形成稳定行为：</text>
  <rect x="600" y="150" width="240" height="40" rx="7" fill="#ffffff" stroke="#86efac" stroke-width="1.4"/>
  <text x="612" y="167" class="ins">指令：X</text>
  <text x="612" y="183" class="ans" fill="#166534" font-weight="600">→ 有帮助的「回答：Y」</text>

  <text x="600" y="216" fill="#166534" font-weight="600" font-size="12">原本就有，这步没动：</text>
  <text x="612" y="237" class="mut">· 知识（事实、常识）</text>
  <text x="612" y="256" class="mut">· 推理（逻辑、计算）</text>

  <line x1="600" y1="272" x2="840" y2="272" stroke="#bbf7d0" stroke-width="1"/>
  <text x="600" y="292" fill="#166534" font-weight="600" font-size="11.5">这一步只补“行为”，不灌新知识。</text>

  <!-- 底部分隔线 + note -->
  <line x1="40" y1="356" x2="840" y2="356" stroke="#e2e8f0" stroke-width="1"/>
  <text x="440" y="374" text-anchor="middle" class="note">监督微调（SFT）= 用一批高质量的「指令 → 回答」示范，沿用预训练那套循环，把模型从“续写”教成“服从”</text>
</svg>
