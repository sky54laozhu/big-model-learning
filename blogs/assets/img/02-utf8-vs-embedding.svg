<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t1 d1">
  <title id="t1">UTF-8 编码 vs Embedding：一个数字 vs 一组数字</title>
  <desc id="d1">对比 UTF-8 编码（每个字一个数字，与语义无关）和 Embedding（每个字一组数字，编码了语义关系）两种文字转数字的方式。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .col-head { fill: #fff; font-weight: 600; font-size: 14px; text-anchor: middle; }
    .row-head { fill: #1a1a1a; font-weight: 600; font-size: 14px; }
    .cell { font-size: 13px; fill: #2a2a2a; }
    .cell-code { font-size: 13px; fill: #2a2a2a; font-family: 'SF Mono', 'Menlo', monospace; }
    .grid { stroke: #d0d3d8; stroke-width: 1; }
    .row-a { fill: #f6f7f9; }
    .row-b { fill: #ffffff; }
    .bad { fill: #dc2626; font-weight: 600; }
    .good { fill: #16a34a; font-weight: 600; }
    .note { fill: #6b7280; font-size: 11px; text-anchor: middle; }
  </style>

  <text x="440" y="30" class="h">文字变数字的两种方式</text>

  <!-- LEFT: UTF-8 -->
  <rect x="30" y="50" width="380" height="320" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="30" y="50" width="380" height="40" rx="8" fill="#dc2626"/>
  <rect x="30" y="78" width="380" height="12" fill="#dc2626"/>
  <text x="220" y="77" class="col-head">UTF-8 编码：一个字 → 一个数字</text>

  <text x="100" y="120" class="row-head">猫</text>
  <text x="280" y="120" class="cell-code">29483</text>

  <line x1="50" y1="135" x2="390" y2="135" class="grid"/>

  <text x="100" y="160" class="row-head">狗</text>
  <text x="280" y="160" class="cell-code">29399</text>

  <line x1="50" y1="175" x2="390" y2="175" class="grid"/>

  <text x="100" y="200" class="row-head">汽车</text>
  <text x="280" y="200" class="cell-code">27773, 36710</text>

  <line x1="50" y1="220" x2="390" y2="220" class="grid"/>

  <text x="220" y="250" class="cell">猫和狗的差值：<tspan class="bad">84</tspan></text>
  <text x="220" y="275" class="cell">猫和汽的差值：<tspan class="bad">1710</tspan></text>
  <text x="220" y="305" class="cell">看起来猫狗更近？<tspan class="bad">纯属巧合！</tspan></text>
  <text x="220" y="335" class="bad" font-size="13" text-anchor="middle">编号按字形排列，跟语义无关</text>

  <!-- RIGHT: Embedding -->
  <rect x="470" y="50" width="380" height="320" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="470" y="50" width="380" height="40" rx="8" fill="#16a34a"/>
  <rect x="470" y="78" width="380" height="12" fill="#16a34a"/>
  <text x="660" y="77" class="col-head">Embedding：一个字 → 一组数字</text>

  <text x="520" y="120" class="row-head">猫</text>
  <text x="720" y="120" class="cell-code">(0.82, 0.11, 0.91, ...)</text>

  <line x1="490" y1="135" x2="830" y2="135" class="grid"/>

  <text x="520" y="160" class="row-head">狗</text>
  <text x="720" y="160" class="cell-code">(0.79, 0.35, 0.88, ...)</text>

  <line x1="490" y1="175" x2="830" y2="175" class="grid"/>

  <text x="520" y="200" class="row-head">汽车</text>
  <text x="720" y="200" class="cell-code">(0.05, 0.92, 0.03, ...)</text>

  <line x1="490" y1="220" x2="830" y2="220" class="grid"/>

  <text x="660" y="250" class="cell">猫和狗的向量：<tspan class="good">非常相似</tspan></text>
  <text x="660" y="275" class="cell">猫和汽车的向量：<tspan class="good">差异很大</tspan></text>
  <text x="660" y="305" class="cell">意思相近 → 向量就相近</text>
  <text x="660" y="335" class="good" font-size="13" text-anchor="middle">从训练数据中学出来，编码了语义</text>

  <!-- Bottom -->
  <text x="440" y="392" class="note">UTF-8：给人用的编码（存储传输） ｜ Embedding：给模型用的编码（理解语义）</text>
</svg>
