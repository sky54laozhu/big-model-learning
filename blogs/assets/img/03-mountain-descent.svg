<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t1 d1">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t1">梯度下降：蒙眼下山</title>
  <desc id="d1">用蒙眼下山的类比解释梯度下降：感觉坡度→迈一步→重复，直到走到谷底。损失大=山顶，损失小=山谷。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .label { fill: #1a1a1a; font-size: 12px; text-anchor: middle; }
    .label-b { fill: #1a1a1a; font-size: 12px; text-anchor: middle; font-weight: 600; }
    .note { fill: #6b7280; font-size: 11px; text-anchor: middle; }
    .axis-label { fill: #64748b; font-size: 11px; }
    .dot { stroke: #fff; stroke-width: 2; }
    .path-line { fill: none; stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 6,3; }
  </style>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e74c3c"/>
    </marker>
  </defs>

  <text x="440" y="30" class="h">梯度下降 = 蒙眼下山</text>

  <!-- Mountain landscape -->
  <path d="M60,320 Q150,100 260,250 Q320,310 400,180 Q440,120 480,180 Q560,310 620,240 Q700,100 800,320" fill="#e8f5ec" stroke="#2e7d3a" stroke-width="2" fill-opacity="0.5"/>

  <!-- Valley bottom marker -->
  <line x1="480" y1="180" x2="480" y2="330" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="480" y="348" class="label-b" fill="#16a34a">谷底：损失最小</text>
  <text x="480" y="365" class="note">预测最准的状态</text>

  <!-- Y axis -->
  <line x1="40" y1="80" x2="40" y2="330" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="38" y="95" class="axis-label" text-anchor="end">高</text>
  <text x="38" y="325" class="axis-label" text-anchor="end">低</text>
  <text x="20" y="200" class="axis-label" text-anchor="middle" transform="rotate(-90, 20, 200)">损失（Loss）</text>

  <!-- Descent path: dots showing the journey -->
  <!-- Start point: high on left peak -->
  <circle cx="170" cy="155" r="8" fill="#dc2626" class="dot"/>
  <text x="170" y="140" fill="#dc2626" font-weight="700" font-size="12" text-anchor="middle">起点</text>
  <text x="170" y="125" fill="#dc2626" font-size="10" text-anchor="middle">随机初始化</text>

  <!-- Step arrows showing descent -->
  <path d="M178,160 L220,220" class="path-line" marker-end="url(#mk)"/>
  <circle cx="225" cy="225" r="5" fill="#e74c3c" class="dot"/>

  <path d="M230,228 L280,260" class="path-line" marker-end="url(#mk)"/>
  <circle cx="285" cy="262" r="5" fill="#e74c3c" class="dot"/>

  <path d="M292,260 L360,210" class="path-line" marker-end="url(#mk)"/>
  <circle cx="365" cy="210" r="5" fill="#e74c3c" class="dot"/>

  <path d="M372,210 L420,190" class="path-line" marker-end="url(#mk)"/>
  <circle cx="425" cy="192" r="5" fill="#f59e0b" class="dot"/>

  <path d="M432,192 L468,183" class="path-line" marker-end="url(#mk)"/>
  <circle cx="475" cy="182" r="6" fill="#16a34a" class="dot"/>
  <text x="475" y="170" fill="#16a34a" font-weight="700" font-size="12" text-anchor="middle">终点</text>

  <!-- Annotations on the right -->
  <rect x="620" y="70" width="230" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="735" y="95" class="label-b">每一步做什么？</text>
  <line x1="640" y1="105" x2="830" y2="105" stroke="#e2e8f0" stroke-width="1"/>
  <text x="645" y="128" class="label" text-anchor="start">1. 感觉坡度 → 算梯度</text>
  <text x="645" y="150" class="label" text-anchor="start">2. 决定步幅 → 学习率</text>
  <text x="645" y="172" class="label" text-anchor="start">3. 迈一步 → 调参数</text>
  <text x="645" y="194" class="label" text-anchor="start">4. 到新位置 → 重复</text>

  <!-- Bottom note -->
  <rect x="140" y="378" width="600" height="4" rx="2" fill="#e2e8f0"/>
  <text x="440" y="396" class="note" fill="#475569">重复万亿次，从山顶走到谷底 —— 模型从瞎猜变成精准预测</text>
</svg>
