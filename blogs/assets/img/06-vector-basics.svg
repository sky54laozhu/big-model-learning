<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t1 d1">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t1">向量 = 一组数字</title>
  <desc id="d1">从 RGB 颜色到 Embedding 向量：维度从 3 到几千，但本质都是一组数字。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .box { rx: 8; }
    .label { font-size: 12px; text-anchor: middle; }
    .label-b { font-size: 13px; text-anchor: middle; font-weight: 600; }
    .num { font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; }
    .dim-label { font-size: 11px; fill: #6b7280; text-anchor: middle; }
  </style>

  <text x="390" y="30" class="h">向量 = 一组有顺序的数字</text>

  <!-- Left: RGB -->
  <text x="180" y="62" class="label-b" fill="#1a1a1a">RGB 颜色向量（3 维）</text>

  <rect x="60" y="76" width="240" height="160" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <rect x="85" y="96" width="50" height="32" class="box" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="110" y="117" class="label" fill="#dc2626">红</text>
  <rect x="145" y="96" width="50" height="32" class="box" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="170" y="117" class="label" fill="#16a34a">绿</text>
  <rect x="205" y="96" width="50" height="32" class="box" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="230" y="117" class="label" fill="#2563eb">蓝</text>

  <text x="110" y="150" class="num" fill="#dc2626" text-anchor="middle">255</text>
  <text x="170" y="150" class="num" fill="#16a34a" text-anchor="middle">0</text>
  <text x="230" y="150" class="num" fill="#2563eb" text-anchor="middle">0</text>

  <text x="180" y="176" class="dim-label">↑ 每个维度含义明确</text>

  <rect x="120" y="192" width="120" height="28" rx="6" fill="#ef4444"/>
  <text x="180" y="211" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">= 纯红色</text>

  <!-- Arrow -->
  <text x="390" y="160" fill="#94a3b8" font-size="28" text-anchor="middle">→</text>
  <text x="390" y="182" class="dim-label">同样的原理</text>

  <!-- Right: Embedding -->
  <text x="600" y="62" class="label-b" fill="#1a1a1a">Embedding 向量（几千维）</text>

  <rect x="480" y="76" width="240" height="160" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <rect x="494" y="96" width="36" height="32" class="box" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="512" y="117" class="num" fill="#6d28d9" text-anchor="middle">0.2</text>
  <rect x="538" y="96" width="36" height="32" class="box" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="556" y="117" class="num" fill="#6d28d9" text-anchor="middle">-0.5</text>
  <rect x="582" y="96" width="36" height="32" class="box" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="117" class="num" fill="#6d28d9" text-anchor="middle">0.8</text>
  <text x="634" y="117" fill="#94a3b8" font-size="14" text-anchor="start">···</text>
  <rect x="660" y="96" width="36" height="32" class="box" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="678" y="117" class="num" fill="#6d28d9" text-anchor="middle">0.3</text>

  <text x="600" y="150" class="dim-label">↑ 每个维度含义未知（训练学出来的）</text>

  <rect x="540" y="168" width="120" height="28" rx="6" fill="#8b5cf6"/>
  <text x="600" y="187" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">= "猫" 的含义</text>

  <text x="600" y="220" class="dim-label">看不懂每个数字 ≠ 没有意义</text>

  <!-- Bottom note -->
  <rect x="140" y="260" width="500" height="40" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="390" y="278" fill="#166534" font-size="12" text-anchor="middle" font-weight="500">共同点：一组数字表示一个事物的特征</text>
  <text x="390" y="294" fill="#15803d" font-size="11" text-anchor="middle">区别只是维度数量（3 vs 几千）和维度含义（人类定义 vs 训练学习）</text>
</svg>
