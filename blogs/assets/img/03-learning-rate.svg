<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t3 d3">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t3">学习率的影响：太大、太小、刚好</title>
  <desc id="d3">三种学习率下的梯度下降表现：太大会跳过谷底来回震荡，太小会极其缓慢，合适的学习率稳步收敛。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .sub-h { font-weight: 600; font-size: 13px; text-anchor: middle; }
    .note { fill: #6b7280; font-size: 11px; text-anchor: middle; }
    .curve { fill: none; stroke-width: 2; }
    .dot { stroke: #fff; stroke-width: 1.5; }
    .valley { stroke-dasharray: 4,3; stroke-width: 1; }
  </style>

  <text x="440" y="30" class="h">学习率（步幅）的影响</text>

  <!-- Case 1: Too large -->
  <rect x="30" y="50" width="260" height="260" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="160" y="75" class="sub-h" fill="#dc2626">学习率太大</text>

  <!-- Mini landscape -->
  <path d="M60,260 Q100,140 160,200 Q220,140 250,260" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" fill-opacity="0.5"/>
  <line x1="160" y1="200" x2="160" y2="265" class="valley" stroke="#dc2626"/>

  <!-- Bouncing path -->
  <circle cx="90" cy="190" r="5" fill="#dc2626" class="dot"/>
  <line x1="95" y1="188" x2="225" y2="160" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="228" cy="160" r="5" fill="#dc2626" class="dot"/>
  <line x1="225" y1="163" x2="100" y2="170" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="98" cy="172" r="5" fill="#dc2626" class="dot"/>
  <line x1="103" y1="170" x2="220" y2="175" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="222" cy="176" r="5" fill="#dc2626" class="dot"/>

  <text x="160" y="290" fill="#991b1b" font-size="12" text-anchor="middle" font-weight="600">跳过谷底，来回震荡</text>

  <!-- Case 2: Too small -->
  <rect x="310" y="50" width="260" height="260" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="440" y="75" class="sub-h" fill="#b45309">学习率太小</text>

  <!-- Mini landscape -->
  <path d="M340,260 Q380,140 440,200 Q500,140 530,260" fill="#fef9c3" stroke="#d97706" stroke-width="1.5" fill-opacity="0.5"/>
  <line x1="440" y1="200" x2="440" y2="265" class="valley" stroke="#d97706"/>

  <!-- Tiny steps path -->
  <circle cx="365" cy="200" r="5" fill="#d97706" class="dot"/>
  <circle cx="372" cy="196" r="4" fill="#d97706" class="dot"/>
  <circle cx="379" cy="193" r="4" fill="#d97706" class="dot"/>
  <circle cx="386" cy="191" r="3" fill="#d97706" class="dot"/>
  <circle cx="392" cy="190" r="3" fill="#d97706" class="dot"/>
  <circle cx="397" cy="189" r="3" fill="#d97706" class="dot"/>
  <text x="410" y="185" fill="#92400e" font-size="10">还远着呢…</text>

  <text x="440" y="290" fill="#92400e" font-size="12" text-anchor="middle" font-weight="600">步子太小，慢得要命</text>

  <!-- Case 3: Just right -->
  <rect x="590" y="50" width="260" height="260" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="720" y="75" class="sub-h" fill="#16a34a">学习率合适</text>

  <!-- Mini landscape -->
  <path d="M620,260 Q660,140 720,200 Q780,140 810,260" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" fill-opacity="0.5"/>
  <line x1="720" y1="200" x2="720" y2="265" class="valley" stroke="#16a34a"/>

  <!-- Smooth descent -->
  <circle cx="648" cy="195" r="5" fill="#16a34a" class="dot"/>
  <line x1="653" y1="196" x2="673" y2="203" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="676" cy="204" r="5" fill="#16a34a" class="dot"/>
  <line x1="681" y1="204" x2="698" y2="203" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="701" cy="203" r="5" fill="#16a34a" class="dot"/>
  <line x1="706" y1="203" x2="714" y2="201" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="717" cy="200" r="6" fill="#16a34a" class="dot"/>
  <text x="717" y="193" fill="#16a34a" font-size="10" text-anchor="middle" font-weight="600">到了!</text>

  <text x="720" y="290" fill="#166534" font-size="12" text-anchor="middle" font-weight="600">稳步走到谷底</text>

  <!-- Bottom -->
  <text x="440" y="332" class="note" fill="#475569">常用学习率：0.001 ~ 0.0001（训练过程中通常会逐步减小）</text>
</svg>
