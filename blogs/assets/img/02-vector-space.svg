<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t2 d2">
  <title id="t2">向量空间：意思相近的词，距离就近</title>
  <desc id="d2">用简化的二维空间展示词向量的分布：动物类（猫、狗、兔子）聚在一起，交通工具（汽车、飞机、火车）聚在一起，情感词（开心、高兴、快乐）聚在一起，互相远离。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .axis { stroke: #cbd5e1; stroke-width: 1.5; }
    .axis-label { fill: #94a3b8; font-size: 11px; }
    .dot { stroke: #fff; stroke-width: 2; }
    .label { font-weight: 500; font-size: 14px; }
    .cluster-bg { opacity: 0.12; }
    .cluster-label { font-weight: 700; font-size: 12px; }
    .note { fill: #6b7280; font-size: 12px; text-anchor: middle; }
    .dashed { stroke-dasharray: 4,3; stroke-width: 1; fill: none; }
  </style>

  <text x="440" y="30" class="h">向量空间：意思相近的词自动聚在一起</text>
  <text x="440" y="50" class="note">（实际是几千维，这里简化成 2 维方便展示）</text>

  <!-- Axes -->
  <line x1="80" y1="400" x2="840" y2="400" class="axis"/>
  <line x1="80" y1="400" x2="80" y2="70" class="axis"/>
  <text x="460" y="435" class="axis-label" text-anchor="middle">维度 1</text>
  <text x="45" y="240" class="axis-label" text-anchor="middle" transform="rotate(-90, 45, 240)">维度 2</text>

  <!-- Cluster 1: Animals (top-left area) -->
  <ellipse cx="240" cy="150" rx="120" ry="80" fill="#3b82f6" class="cluster-bg"/>
  <ellipse cx="240" cy="150" rx="120" ry="80" class="dashed" stroke="#3b82f6"/>
  <text x="240" y="92" class="cluster-label" fill="#1d4ed8">动物</text>

  <circle cx="200" cy="140" r="6" fill="#3b82f6" class="dot"/>
  <text x="200" y="130" fill="#1d4ed8" class="label" text-anchor="middle">猫</text>

  <circle cx="260" cy="155" r="6" fill="#3b82f6" class="dot"/>
  <text x="260" y="145" fill="#1d4ed8" class="label" text-anchor="middle">狗</text>

  <circle cx="220" cy="185" r="6" fill="#3b82f6" class="dot"/>
  <text x="220" y="205" fill="#1d4ed8" class="label" text-anchor="middle">兔子</text>

  <circle cx="290" cy="130" r="6" fill="#3b82f6" class="dot"/>
  <text x="290" y="120" fill="#1d4ed8" class="label" text-anchor="middle">仓鼠</text>

  <!-- Cluster 2: Vehicles (bottom-right area) -->
  <ellipse cx="660" cy="330" rx="130" ry="70" fill="#f59e0b" class="cluster-bg"/>
  <ellipse cx="660" cy="330" rx="130" ry="70" class="dashed" stroke="#d97706"/>
  <text x="660" y="280" class="cluster-label" fill="#92400e">交通工具</text>

  <circle cx="620" cy="320" r="6" fill="#d97706" class="dot"/>
  <text x="620" y="310" fill="#92400e" class="label" text-anchor="middle">汽车</text>

  <circle cx="690" cy="340" r="6" fill="#d97706" class="dot"/>
  <text x="690" y="360" fill="#92400e" class="label" text-anchor="middle">火车</text>

  <circle cx="730" cy="310" r="6" fill="#d97706" class="dot"/>
  <text x="730" y="300" fill="#92400e" class="label" text-anchor="middle">飞机</text>

  <circle cx="600" cy="350" r="6" fill="#d97706" class="dot"/>
  <text x="600" y="370" fill="#92400e" class="label" text-anchor="middle">自行车</text>

  <!-- Cluster 3: Emotions (right-top area) -->
  <ellipse cx="650" cy="140" rx="110" ry="70" fill="#10b981" class="cluster-bg"/>
  <ellipse cx="650" cy="140" rx="110" ry="70" class="dashed" stroke="#10b981"/>
  <text x="650" y="90" class="cluster-label" fill="#047857">情感（正面）</text>

  <circle cx="620" cy="135" r="6" fill="#10b981" class="dot"/>
  <text x="620" y="125" fill="#047857" class="label" text-anchor="middle">开心</text>

  <circle cx="670" cy="150" r="6" fill="#10b981" class="dot"/>
  <text x="670" y="170" fill="#047857" class="label" text-anchor="middle">高兴</text>

  <circle cx="700" cy="125" r="6" fill="#10b981" class="dot"/>
  <text x="700" y="115" fill="#047857" class="label" text-anchor="middle">快乐</text>

  <!-- Cluster 4: Emotions negative (middle area) -->
  <ellipse cx="400" cy="300" rx="100" ry="60" fill="#ef4444" class="cluster-bg"/>
  <ellipse cx="400" cy="300" rx="100" ry="60" class="dashed" stroke="#ef4444"/>
  <text x="400" y="260" class="cluster-label" fill="#991b1b">情感（负面）</text>

  <circle cx="370" cy="300" r="6" fill="#ef4444" class="dot"/>
  <text x="370" y="290" fill="#991b1b" class="label" text-anchor="middle">难过</text>

  <circle cx="420" cy="310" r="6" fill="#ef4444" class="dot"/>
  <text x="420" y="330" fill="#991b1b" class="label" text-anchor="middle">伤心</text>

  <circle cx="440" cy="285" r="6" fill="#ef4444" class="dot"/>
  <text x="455" y="278" fill="#991b1b" class="label" text-anchor="start">悲伤</text>

  <!-- Bottom insight box -->
  <rect x="140" y="420" width="600" height="32" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
  <text x="440" y="442" fill="#854d0e" font-size="13" text-anchor="middle" font-weight="500">没有人告诉模型"猫和狗是一类" —— 它从训练数据中自己学出了这些聚类</text>
</svg>
