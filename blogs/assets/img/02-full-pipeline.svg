<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t4 d4">
  <title id="t4">完整流水线：从文字到概率分布</title>
  <desc id="d4">展示大模型处理文本的完整流程：原始文本 → 分词（Tokenization）→ 查表得到向量（Embedding）→ 神经网络运算 → 输出概率分布。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .arrow { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#mk); }
    .stage-label { fill: #fff; font-weight: 600; font-size: 12px; text-anchor: middle; }
    .note { fill: #6b7280; font-size: 11px; text-anchor: middle; }
    .content { fill: #2a2a2a; font-size: 12px; text-anchor: middle; }
    .content-b { fill: #2a2a2a; font-size: 12px; text-anchor: middle; font-weight: 600; }
  </style>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <text x="440" y="30" class="h">从文字到概率：大模型的完整流水线</text>

  <!-- Stage 1: Raw text -->
  <rect x="30" y="60" width="160" height="100" rx="10" fill="#f8fafc" stroke="#1a2233" stroke-width="2"/>
  <rect x="30" y="60" width="160" height="30" rx="10" fill="#64748b"/>
  <rect x="30" y="80" width="160" height="10" fill="#64748b"/>
  <text x="110" y="82" class="stage-label">原始文本</text>
  <text x="110" y="115" class="content-b" font-size="14">"猫喜欢吃鱼"</text>
  <text x="110" y="140" class="note">人类可读的文字</text>

  <!-- Arrow 1→2 -->
  <path d="M190,110 L230,110" class="arrow"/>

  <!-- Stage 2: Tokenization -->
  <rect x="230" y="60" width="150" height="100" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="230" y="60" width="150" height="30" rx="10" fill="#3b82f6"/>
  <rect x="230" y="80" width="150" height="10" fill="#3b82f6"/>
  <text x="305" y="82" class="stage-label">分词 Tokenization</text>
  <text x="305" y="115" class="content-b">["猫","喜","欢","吃","鱼"]</text>
  <text x="305" y="140" class="note">拆成 token 序列</text>

  <!-- Arrow 2→3 -->
  <path d="M380,110 L420,110" class="arrow"/>

  <!-- Stage 3: Embedding -->
  <rect x="420" y="60" width="160" height="100" rx="10" fill="#fefce8" stroke="#d97706" stroke-width="2"/>
  <rect x="420" y="60" width="160" height="30" rx="10" fill="#d97706"/>
  <rect x="420" y="80" width="160" height="10" fill="#d97706"/>
  <text x="500" y="82" class="stage-label">词嵌入 Embedding</text>
  <text x="500" y="112" class="content">(0.82, 0.11, ...)</text>
  <text x="500" y="128" class="content">(0.34, -0.56, ...)</text>
  <text x="500" y="140" class="content">...</text>
  <text x="500" y="155" class="note">每个 token → 向量</text>

  <!-- Arrow 3→4 -->
  <path d="M580,110 L620,110" class="arrow"/>

  <!-- Stage 4: Neural Network -->
  <rect x="620" y="60" width="120" height="100" rx="10" fill="#1a2233"/>
  <text x="680" y="95" fill="#fff" font-weight="700" font-size="14" text-anchor="middle">神经网络</text>
  <text x="680" y="115" fill="#94a3b8" font-size="11" text-anchor="middle">几十层</text>
  <text x="680" y="130" fill="#94a3b8" font-size="11" text-anchor="middle">kx+b + 激活</text>
  <text x="680" y="145" fill="#94a3b8" font-size="11" text-anchor="middle">× 万亿参数</text>

  <!-- Arrow 4→5 -->
  <path d="M740,110 L770,110" class="arrow"/>

  <!-- Stage 5: Output -->
  <rect x="770" y="60" width="90" height="100" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <rect x="770" y="60" width="90" height="30" rx="10" fill="#16a34a"/>
  <rect x="770" y="80" width="90" height="10" fill="#16a34a"/>
  <text x="815" y="82" class="stage-label">输出</text>
  <text x="815" y="108" fill="#166534" font-size="11" text-anchor="middle">的: 35%</text>
  <text x="815" y="124" fill="#166534" font-size="11" text-anchor="middle">。: 20%</text>
  <text x="815" y="140" fill="#166534" font-size="11" text-anchor="middle">和: 8%</text>
  <text x="815" y="153" fill="#9ca3af" font-size="10" text-anchor="middle">...</text>

  <!-- Detail boxes below -->
  <!-- Tokenization detail -->
  <rect x="60" y="200" width="240" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="180" y="225" fill="#1a2233" font-weight="600" font-size="13" text-anchor="middle">分词器怎么拆？</text>
  <line x1="80" y1="235" x2="280" y2="235" stroke="#e2e8f0" stroke-width="1"/>
  <text x="180" y="258" class="content">中文：通常按字拆</text>
  <text x="180" y="278" class="content">英文：按子词（subword）拆</text>
  <text x="180" y="298" class="content">词表大小：约 5~10 万个 token</text>
  <text x="180" y="322" class="content">像组件一样组合 → 拼出任意文本</text>

  <!-- Embedding detail -->
  <rect x="320" y="200" width="240" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="440" y="225" fill="#1a2233" font-weight="600" font-size="13" text-anchor="middle">Embedding 表长什么样？</text>
  <line x1="340" y1="235" x2="540" y2="235" stroke="#e2e8f0" stroke-width="1"/>
  <text x="440" y="258" class="content">一张巨大的查找表</text>
  <text x="440" y="278" class="content">行数 = 词表大小（~10 万）</text>
  <text x="440" y="298" class="content">列数 = 向量维度（~几千）</text>
  <text x="440" y="322" class="content">每个值都是训练学出来的参数</text>

  <!-- Neural Network detail -->
  <rect x="580" y="200" width="270" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="225" fill="#1a2233" font-weight="600" font-size="13" text-anchor="middle">神经网络里发生了什么？</text>
  <line x1="600" y1="235" x2="830" y2="235" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="258" class="content">向量经过几十层运算</text>
  <text x="715" y="278" class="content">每一层：矩阵乘法 + 激活函数</text>
  <text x="715" y="298" class="content">层与层之间传递、变换信息</text>
  <text x="715" y="322" class="content">最终输出下一个 token 的概率</text>

  <!-- Bottom -->
  <rect x="140" y="365" width="600" height="4" rx="2" fill="#e2e8f0"/>
  <text x="440" y="378" class="note" fill="#475569">这条流水线每运行一次，生成一个 token —— 然后把新 token 加入输入，重复运行</text>
</svg>
