<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t2 d2">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t2">一个 Transformer 层</title>
  <desc id="d2">一个 Transformer 层的内部结构：Multi-Head Attention → Add &amp; Norm → FFN → Add &amp; Norm。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .box { rx: 8; }
    .label { font-size: 13px; text-anchor: middle; }
    .label-b { font-size: 13px; text-anchor: middle; font-weight: 600; }
    .arrow { fill: none; stroke: #5a5a5a; stroke-width: 1.5; marker-end: url(#mk); }
    .skip { fill: none; stroke: #16a34a; stroke-width: 2; stroke-dasharray: 6 3; }
    .note { fill: #6b7280; font-size: 11px; }
  </style>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <text x="300" y="32" class="h">一个 Transformer 层</text>

  <!-- Outer block border -->
  <rect x="100" y="80" width="400" height="400" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="130" y="100" font-size="12" fill="#94a3b8" font-weight="600">× 96 层（GPT-3）</text>

  <!-- Input -->
  <rect x="220" y="50" width="160" height="32" class="box" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="300" y="71" class="label-b" fill="#1d4ed8">输入向量 x</text>

  <path d="M300,82 L300,112" class="arrow"/>

  <!-- Step 1: Multi-Head Attention -->
  <rect x="200" y="114" width="200" height="44" class="box" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="300" y="141" class="label-b" fill="#6d28d9">Multi-Head Attention</text>
  <text x="435" y="141" class="note" text-anchor="start">← 沟通</text>

  <path d="M300,158 L300,178" class="arrow"/>

  <!-- Skip connection 1 -->
  <path d="M200,70 Q140,70 140,170 L140,200 Q140,210 200,210" class="skip"/>
  <circle cx="200" cy="210" r="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="200" y="214" font-size="14" font-weight="700" fill="#16a34a" text-anchor="middle">+</text>

  <!-- Add & Norm 1 -->
  <rect x="220" y="190" width="160" height="36" class="box" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="300" y="213" class="label" fill="#166534">Add &amp; LayerNorm</text>
  <text x="435" y="213" class="note" text-anchor="start">← 残差+归一</text>

  <path d="M300,226 L300,256" class="arrow"/>

  <!-- Step 2: FFN -->
  <rect x="200" y="258" width="200" height="44" class="box" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="300" y="285" class="label-b" fill="#92400e">FFN（前馈网络）</text>
  <text x="435" y="285" class="note" text-anchor="start">← 消化</text>

  <path d="M300,302 L300,322" class="arrow"/>

  <!-- Skip connection 2 -->
  <path d="M200,213 Q140,213 140,320 L140,350 Q140,360 200,360" class="skip"/>
  <circle cx="200" cy="360" r="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="200" y="364" font-size="14" font-weight="700" fill="#16a34a" text-anchor="middle">+</text>

  <!-- Add & Norm 2 -->
  <rect x="220" y="340" width="160" height="36" class="box" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="300" y="363" class="label" fill="#166534">Add &amp; LayerNorm</text>
  <text x="435" y="363" class="note" text-anchor="start">← 残差+归一</text>

  <path d="M300,376 L300,406" class="arrow"/>

  <!-- Output -->
  <rect x="220" y="446" width="160" height="32" class="box" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="300" y="467" class="label-b" fill="#1d4ed8">输出（→ 下一层）</text>

  <path d="M300,408 L300,444" class="arrow"/>

  <!-- Summary -->
  <text x="300" y="504" fill="#64748b" font-size="11" text-anchor="middle">一层 = Attention（沟通）+ FFN（消化）+ 残差连接 + LayerNorm</text>
</svg>
