<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 372" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t d">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t">全量微调，又贵又重</title>
  <desc id="d">以 70B 基座、5 个专家为例，展示全量微调的两个痛点：训练时显存膨胀到模型数倍、需要 GPU 集群；存储部署时每个专家是一份完整 140GB 权重，5 个专家共 700GB，切换需重载，又慢又占地方。引出下一篇 LoRA。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 17px; }
    .sub { fill: #6b7280; font-size: 12px; text-anchor: middle; }
    .h2 { font-weight: 600; fill: #1a2233; font-size: 13px; }
    .note { fill: #6b7280; font-size: 12px; }
    .red { fill: #dc2626; font-size: 12px; }
    .redb { fill: #dc2626; font-size: 12px; font-weight: 600; }
    .content { fill: #2a2a2a; font-size: 12px; }
    .stage-label { fill: #ffffff; font-weight: 600; font-size: 13px; }
    .arrow { fill: none; stroke: #dc2626; stroke-width: 1.6; marker-end: url(#mk); }
  </style>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <text x="440" y="30" class="h">全量微调，又贵又重</text>
  <text x="440" y="50" class="sub">设定：70B 基座，想做 5 个专家</text>

  <!-- 痛点一·训练时 -->
  <g>
    <rect x="40" y="70" width="390" height="232" rx="8" fill="#fff5f5" stroke="#dc2626" stroke-width="1.5"/>
    <!-- 标题栏 -->
    <rect x="40" y="70" width="390" height="30" rx="8" fill="#dc2626"/>
    <rect x="40" y="84" width="390" height="16" fill="#dc2626"/>
    <text x="56" y="90" class="stage-label">痛点一 · 训练时</text>

    <text x="60" y="128" class="h2">动全部 700 亿参数训练</text>

    <text x="60" y="155" class="content">不仅要存权重，还要额外存：</text>
    <rect x="60" y="166" width="350" height="26" rx="5" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
    <text x="74" y="183" class="redb">梯度</text>
    <text x="120" y="183" class="content">+</text>
    <text x="140" y="183" class="redb">优化器状态（动量/方差）</text>

    <text x="60" y="216" class="redb" font-size="13">→ 显存膨胀到模型的好几倍</text>

    <rect x="60" y="232" width="350" height="50" rx="5" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
    <text x="74" y="252" class="content">需要 <tspan fill="#dc2626" font-weight="600">几百 GB 显存</tspan></text>
    <text x="74" y="272" class="content">单卡装不下 → 要一整套 <tspan fill="#dc2626" font-weight="600">GPU 集群</tspan></text>
  </g>

  <!-- 痛点二·存储/部署时 -->
  <g>
    <rect x="450" y="70" width="390" height="232" rx="8" fill="#fff5f5" stroke="#dc2626" stroke-width="1.5"/>
    <rect x="450" y="70" width="390" height="30" rx="8" fill="#dc2626"/>
    <rect x="450" y="84" width="390" height="16" fill="#dc2626"/>
    <text x="466" y="90" class="stage-label">痛点二 · 存储 / 部署时</text>

    <text x="470" y="128" class="h2">每个专家 = 一份完整权重</text>

    <text x="470" y="155" class="content">1 个专家 = 完整 <tspan fill="#dc2626" font-weight="600">140GB</tspan></text>

    <!-- 5 份权重示意 -->
    <g>
      <rect x="470" y="166" width="58" height="30" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
      <text x="499" y="185" text-anchor="middle" class="red">140GB</text>
      <rect x="536" y="166" width="58" height="30" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
      <text x="565" y="185" text-anchor="middle" class="red">140GB</text>
      <rect x="602" y="166" width="58" height="30" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
      <text x="631" y="185" text-anchor="middle" class="red">140GB</text>
      <rect x="668" y="166" width="58" height="30" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
      <text x="697" y="185" text-anchor="middle" class="red">140GB</text>
      <rect x="734" y="166" width="58" height="30" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
      <text x="763" y="185" text-anchor="middle" class="red">140GB</text>
    </g>

    <text x="470" y="222" class="redb" font-size="13">→ 5 个专家共 700GB</text>

    <rect x="470" y="232" width="350" height="50" rx="5" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
    <text x="484" y="252" class="content">切换专家要重载 <tspan fill="#dc2626" font-weight="600">140GB</tspan></text>
    <text x="484" y="272" class="content">又 <tspan fill="#dc2626" font-weight="600">慢</tspan>、又 <tspan fill="#dc2626" font-weight="600">占地方</tspan></text>
  </g>

  <!-- 底部引导条 -->
  <line x1="40" y1="320" x2="840" y2="320" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="40" y="332" width="800" height="30" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="440" y="352" text-anchor="middle" class="h2">有没有办法 —— 不动那几十亿参数，也能微调？  下一篇补课讲 LoRA</text>
</svg>
