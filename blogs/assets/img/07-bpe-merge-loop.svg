<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t7 d7">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t7">BPE 合并循环</title>
  <desc id="d7">BPE 通过统计相邻字符对的频率，反复合并最高频对，把碎字符逐渐长成完整词，直到词表达到目标大小。</desc>
  <style>
    .h { font-weight: 700; fill: #1a2233; text-anchor: middle; font-size: 18px; }
    .stage-label { fill: #ffffff; font-weight: 700; font-size: 13px; }
    .note { fill: #6b7280; font-size: 12px; }
    .lbl { fill: #6b7280; font-size: 12px; }
    .tok { fill: #1a2233; font-weight: 600; font-size: 14px; text-anchor: middle; }
    .win { fill: #16a34a; font-weight: 700; font-size: 13px; }
    .freq { fill: #1a2233; font-size: 13px; }
    .step { fill: #1a2233; font-size: 12.5px; }
    .arrow { fill: none; stroke: #6b7280; stroke-width: 1.6; marker-end: url(#mk); }
    .loop { fill: none; stroke: #16a34a; stroke-width: 1.8; marker-end: url(#mkg); stroke-dasharray: 5 3; }
  </style>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="mkg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <text x="440" y="32" class="h">BPE：数频率、合并、重复</text>

  <!-- ===== 左侧：迷你语料一轮合并演示 ===== -->
  <!-- 卡片标题栏 -->
  <rect x="30" y="52" width="400" height="26" rx="6" fill="#1a2233"/>
  <rect x="30" y="64" width="400" height="14" fill="#1a2233"/>
  <text x="44" y="70" class="stage-label">一轮合并演示</text>
  <rect x="30" y="78" width="400" height="262" rx="0" fill="#f8fafc" stroke="#e2e8f0"/>

  <!-- 语料 -->
  <text x="46" y="102" class="lbl">迷你语料</text>
  <rect x="46" y="110" width="100" height="30" rx="5" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="96" y="130" class="tok">新闻 ×5</text>
  <rect x="158" y="110" width="100" height="30" rx="5" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="208" y="130" class="tok">旧闻 ×1</text>
  <rect x="270" y="110" width="100" height="30" rx="5" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="320" y="130" class="tok">新人 ×1</text>

  <!-- 拆成单字词表 -->
  <text x="46" y="166" class="lbl">拆成单字 · 词表</text>
  <rect x="46" y="174" width="40" height="28" rx="5" fill="#fef3c7" stroke="#d97706"/>
  <text x="66" y="193" class="tok">新</text>
  <rect x="94" y="174" width="40" height="28" rx="5" fill="#fef3c7" stroke="#d97706"/>
  <text x="114" y="193" class="tok">闻</text>
  <rect x="142" y="174" width="40" height="28" rx="5" fill="#fef3c7" stroke="#d97706"/>
  <text x="162" y="193" class="tok">旧</text>
  <rect x="190" y="174" width="40" height="28" rx="5" fill="#fef3c7" stroke="#d97706"/>
  <text x="210" y="193" class="tok">人</text>

  <!-- 相邻对频率小表 -->
  <text x="46" y="230" class="lbl">相邻对频率</text>
  <rect x="46" y="238" width="160" height="26" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/>
  <text x="58" y="256" class="freq">新-闻</text>
  <text x="194" y="256" class="win" text-anchor="end">= 5 ✓</text>
  <rect x="46" y="270" width="160" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="58" y="287" class="freq">旧-闻</text>
  <text x="194" y="287" class="freq" text-anchor="end">= 1</text>
  <rect x="46" y="300" width="160" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="58" y="317" class="freq">新-人</text>
  <text x="194" y="317" class="freq" text-anchor="end">= 1</text>

  <!-- 合并结果 -->
  <path class="arrow" d="M214,266 L250,266"/>
  <text x="240" y="232" class="lbl">合并最高频对</text>
  <rect x="252" y="240" width="160" height="32" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/>
  <text x="332" y="261" class="tok" fill="#16a34a">新 + 闻 → 新闻</text>
  <text x="252" y="296" class="lbl">词表新增 token</text>
  <rect x="252" y="304" width="70" height="28" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="287" y="323" class="tok" fill="#16a34a">新闻</text>

  <!-- ===== 右侧：循环流程 ===== -->
  <rect x="460" y="52" width="390" height="26" rx="6" fill="#1a2233"/>
  <rect x="460" y="64" width="390" height="14" fill="#1a2233"/>
  <text x="474" y="70" class="stage-label">循环流程</text>
  <rect x="460" y="78" width="390" height="262" rx="0" fill="#f8fafc" stroke="#e2e8f0"/>

  <!-- ① -->
  <rect x="494" y="100" width="320" height="34" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <circle cx="514" cy="117" r="11" fill="#3b82f6"/>
  <text x="514" y="121" fill="#ffffff" font-weight="700" font-size="12" text-anchor="middle">1</text>
  <text x="534" y="121" class="step">拆成最小单位（字节）</text>
  <path class="arrow" d="M654,134 L654,150"/>

  <!-- ② -->
  <rect x="494" y="152" width="320" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <circle cx="514" cy="169" r="11" fill="#d97706"/>
  <text x="514" y="173" fill="#ffffff" font-weight="700" font-size="12" text-anchor="middle">2</text>
  <text x="534" y="173" class="step">统计所有相邻对的频率</text>
  <path class="arrow" d="M654,186 L654,202"/>

  <!-- ③ -->
  <rect x="494" y="204" width="320" height="34" rx="6" fill="#f0fdf4" stroke="#16a34a"/>
  <circle cx="514" cy="221" r="11" fill="#16a34a"/>
  <text x="514" y="225" fill="#ffffff" font-weight="700" font-size="12" text-anchor="middle">3</text>
  <text x="534" y="225" class="step">合并最高频对为新 token</text>
  <path class="arrow" d="M654,238 L654,254"/>

  <!-- ④ -->
  <rect x="494" y="256" width="320" height="34" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <circle cx="514" cy="273" r="11" fill="#3b82f6"/>
  <text x="514" y="277" fill="#ffffff" font-weight="700" font-size="12" text-anchor="middle">4</text>
  <text x="534" y="277" class="step">加进词表</text>

  <!-- 回环箭头：④ 绕回 ② -->
  <path class="loop" d="M814,273 L834,273 L834,169 L818,169"/>
  <text x="838" y="225" class="win" text-anchor="middle" transform="rotate(90 838 225)">回到第 2 步</text>

  <!-- ===== 底部 note ===== -->
  <rect x="30" y="352" width="820" height="1.5" fill="#e2e8f0"/>
  <text x="440" y="372" class="note" text-anchor="middle">跑越久 token 越长：新 → 新闻 → 新闻联播，直到词表达到目标大小（如 5 万）</text>
</svg>
