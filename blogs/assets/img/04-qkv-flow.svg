<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t3 d3">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t3">Q/K/V 完整流程</title>
  <desc id="d3">展示 Attention 的完整计算流程：原始向量通过三组参数变换为 Q/K/V，Q 和 K 算相似度得到权重，权重对 V 加权求和得到输出。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .box { rx: 8; }
    .label { font-size: 12px; text-anchor: middle; }
    .label-b { font-size: 12px; text-anchor: middle; font-weight: 600; }
    .arrow { fill: none; stroke: #5a5a5a; stroke-width: 1.5; marker-end: url(#mk); }
    .note { fill: #6b7280; font-size: 11px; text-anchor: middle; }
    .step-num { fill: #fff; font-weight: 700; font-size: 11px; text-anchor: middle; }
    .step-label { font-size: 12px; font-weight: 600; fill: #1a1a1a; }
  </style>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <text x="440" y="32" class="h">Attention 完整流程（以"吃"为例）</text>

  <!-- Step 1: Original vectors -->
  <circle cx="56" cy="62" r="11" fill="#64748b"/>
  <text x="56" y="66" class="step-num">1</text>
  <text x="74" y="67" class="step-label" text-anchor="start">每个 token 的原始向量</text>

  <rect x="50" y="80" width="100" height="36" class="box" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="103" class="label" fill="#1d4ed8">猫 向量</text>
  <rect x="160" y="80" width="100" height="36" class="box" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="210" y="103" class="label" fill="#92400e">吃 向量</text>
  <rect x="270" y="80" width="100" height="36" class="box" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="320" y="103" class="label" fill="#166534">鱼 向量</text>

  <!-- Step 2: Transform to Q/K/V -->
  <path d="M210,116 L210,148" class="arrow"/>

  <circle cx="56" cy="162" r="11" fill="#64748b"/>
  <text x="56" y="166" class="step-num">2</text>
  <text x="74" y="167" class="step-label" text-anchor="start">乘以参数矩阵，变换出 Q/K/V</text>

  <rect x="50" y="180" width="100" height="36" class="box" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="1.5"/>
  <text x="100" y="203" class="label" fill="#be185d">Q（查询）</text>
  <rect x="160" y="180" width="100" height="36" class="box" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="210" y="203" class="label" fill="#6d28d9">K（键）</text>
  <rect x="270" y="180" width="100" height="36" class="box" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="320" y="203" class="label" fill="#b45309">V（值）</text>

  <text x="210" y="238" class="note">× W_q 得到 Q ｜ × W_k 得到 K ｜ × W_v 得到 V</text>
  <text x="210" y="254" class="note">（W_q、W_k、W_v 是训练学出来的参数）</text>

  <!-- Step 3: Compute similarity -->
  <circle cx="478" cy="62" r="11" fill="#64748b"/>
  <text x="478" y="66" class="step-num">3</text>
  <text x="496" y="67" class="step-label" text-anchor="start">Q 和每个 K 算相似度</text>

  <rect x="470" y="80" width="370" height="100" class="box" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="530" y="108" class="label" fill="#be185d" text-anchor="start">吃的Q</text>
  <text x="600" y="108" class="label" text-anchor="start">·</text>
  <text x="615" y="108" class="label" fill="#6d28d9" text-anchor="start">猫的K</text>
  <text x="700" y="108" class="label" text-anchor="start">→</text>
  <text x="725" y="108" class="label-b" text-anchor="start">0.5（高）</text>

  <text x="530" y="138" class="label" fill="#be185d" text-anchor="start">吃的Q</text>
  <text x="600" y="138" class="label" text-anchor="start">·</text>
  <text x="615" y="138" class="label" fill="#6d28d9" text-anchor="start">吃的K</text>
  <text x="700" y="138" class="label" text-anchor="start">→</text>
  <text x="725" y="138" class="label-b" text-anchor="start">0.1（低）</text>

  <text x="530" y="168" class="label" fill="#be185d" text-anchor="start">吃的Q</text>
  <text x="600" y="168" class="label" text-anchor="start">·</text>
  <text x="615" y="168" class="label" fill="#6d28d9" text-anchor="start">鱼的K</text>
  <text x="700" y="168" class="label" text-anchor="start">→</text>
  <text x="725" y="168" class="label-b" text-anchor="start">0.4（中）</text>

  <!-- Step 4: Weighted sum -->
  <circle cx="478" cy="210" r="11" fill="#64748b"/>
  <text x="478" y="214" class="step-num">4</text>
  <text x="496" y="215" class="step-label" text-anchor="start">用权重对 V 加权求和</text>

  <rect x="470" y="230" width="380" height="44" class="box" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="660" y="257" fill="#1a2233" font-size="12" text-anchor="middle" font-family="'SF Mono',monospace">猫的V×0.5 + 吃的V×0.1 + 鱼的V×0.4</text>

  <!-- Step 5: Result -->
  <path d="M660,274 L660,304" class="arrow"/>

  <circle cx="478" cy="322" r="11" fill="#16a34a"/>
  <text x="478" y="326" class="step-num">5</text>

  <rect x="496" y="306" width="300" height="36" rx="8" fill="#16a34a"/>
  <text x="646" y="329" fill="#fff" font-weight="600" font-size="13" text-anchor="middle">"吃"的新向量（含上下文）</text>

  <!-- Bottom note -->
  <rect x="100" y="365" width="680" height="40" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
  <text x="440" y="382" fill="#854d0e" font-size="12" text-anchor="middle" font-weight="500">每个 token 都做同样的流程 → 所有 token 都获得了上下文信息</text>
  <text x="440" y="398" fill="#92400e" font-size="11" text-anchor="middle">这就是 Self-Attention（自注意力）—— 每个 token 关注包括自己在内的所有 token</text>
</svg>
