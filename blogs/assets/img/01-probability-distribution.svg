<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t1 d1">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t1">同一句话，不同场景下的概率分布</title>
  <desc id="d1">展示"这家餐厅的菜真好___"在朋友圈食评和美食摄影杂志两个场景下，下一个字的概率分布完全不同。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .h2 { font-weight: 600; fill: #1a1a1a; text-anchor: middle; font-size: 14px; }
    .prompt { fill: #1a2233; font-weight: 600; font-size: 15px; text-anchor: middle; }
    .cursor { fill: #e74c3c; font-weight: 700; font-size: 18px; }
    .label { fill: #2a2a2a; text-anchor: middle; font-size: 13px; }
    .pct { fill: #5a5a5a; text-anchor: middle; font-size: 11px; }
    .bar-a { fill: #3b82f6; }
    .bar-b { fill: #10b981; }
    .scene-a { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.5; }
    .scene-b { fill: #ecfdf5; stroke: #10b981; stroke-width: 1.5; }
    .scene-label-a { fill: #1d4ed8; font-weight: 600; font-size: 14px; text-anchor: middle; }
    .scene-label-b { fill: #047857; font-weight: 600; font-size: 14px; text-anchor: middle; }
    .note { fill: #6b7280; font-size: 11px; text-anchor: middle; }
  </style>

  <!-- Title -->
  <text x="440" y="32" class="h">同一句话，不同场景 → 不同的概率分布</text>

  <!-- Prompt display -->
  <rect x="240" y="50" width="400" height="40" rx="8" fill="#f8fafc" stroke="#1a2233" stroke-width="1.5"/>
  <text x="420" y="76" class="prompt">这家餐厅的菜真好</text>
  <text x="640" y="76" class="prompt">___</text>
  <text x="650" y="76" class="cursor">|</text>

  <!-- Arrow down left -->
  <line x1="340" y1="95" x2="220" y2="130" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#mk-a)"/>
  <!-- Arrow down right -->
  <line x1="540" y1="95" x2="660" y2="130" stroke="#10b981" stroke-width="1.5" marker-end="url(#mk-b)"/>

  <defs>
    <marker id="mk-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="mk-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Scene A: 朋友圈 -->
  <rect x="40" y="130" width="380" height="270" rx="8" class="scene-a"/>
  <text x="230" y="155" class="scene-label-a">场景 A：朋友圈食评</text>

  <!-- Bars for Scene A -->
  <!-- 吃 70% -->
  <rect x="80" y="180" width="245" height="32" rx="4" class="bar-a"/>
  <text x="68" y="201" class="label" text-anchor="end">吃</text>
  <text x="335" y="201" class="pct" text-anchor="start"> 70%</text>
  <!-- 看 10% -->
  <rect x="80" y="222" width="35" height="32" rx="4" class="bar-a" opacity="0.7"/>
  <text x="68" y="243" class="label" text-anchor="end">看</text>
  <text x="125" y="243" class="pct" text-anchor="start"> 10%</text>
  <!-- 香 8% -->
  <rect x="80" y="264" width="28" height="32" rx="4" class="bar-a" opacity="0.5"/>
  <text x="68" y="285" class="label" text-anchor="end">香</text>
  <text x="118" y="285" class="pct" text-anchor="start"> 8%</text>
  <!-- 闻 5% -->
  <rect x="80" y="306" width="18" height="32" rx="4" class="bar-a" opacity="0.4"/>
  <text x="68" y="327" class="label" text-anchor="end">闻</text>
  <text x="108" y="327" class="pct" text-anchor="start"> 5%</text>
  <!-- 其他 7% -->
  <rect x="80" y="348" width="25" height="32" rx="4" class="bar-a" opacity="0.3"/>
  <text x="68" y="369" class="label" text-anchor="end">…</text>
  <text x="115" y="369" class="pct" text-anchor="start"> 7%</text>

  <!-- Scene B: 摄影杂志 -->
  <rect x="460" y="130" width="380" height="270" rx="8" class="scene-b"/>
  <text x="650" y="155" class="scene-label-b">场景 B：美食摄影杂志</text>

  <!-- Bars for Scene B -->
  <!-- 看 60% -->
  <rect x="500" y="180" width="210" height="32" rx="4" class="bar-b"/>
  <text x="488" y="201" class="label" text-anchor="end">看</text>
  <text x="720" y="201" class="pct" text-anchor="start"> 60%</text>
  <!-- 吃 20% -->
  <rect x="500" y="222" width="70" height="32" rx="4" class="bar-b" opacity="0.7"/>
  <text x="488" y="243" class="label" text-anchor="end">吃</text>
  <text x="580" y="243" class="pct" text-anchor="start"> 20%</text>
  <!-- 大 8% -->
  <rect x="500" y="264" width="28" height="32" rx="4" class="bar-b" opacity="0.5"/>
  <text x="488" y="285" class="label" text-anchor="end">大</text>
  <text x="538" y="285" class="pct" text-anchor="start"> 8%</text>
  <!-- 美 7% -->
  <rect x="500" y="306" width="25" height="32" rx="4" class="bar-b" opacity="0.4"/>
  <text x="488" y="327" class="label" text-anchor="end">美</text>
  <text x="535" y="327" class="pct" text-anchor="start"> 7%</text>
  <!-- 其他 5% -->
  <rect x="500" y="348" width="18" height="32" rx="4" class="bar-b" opacity="0.3"/>
  <text x="488" y="369" class="label" text-anchor="end">…</text>
  <text x="528" y="369" class="pct" text-anchor="start"> 5%</text>

  <!-- Bottom note -->
  <text x="440" y="415" class="note">上下文不同，概率分布就不同 —— 大模型的核心能力就是根据上下文计算这个分布</text>
</svg>
