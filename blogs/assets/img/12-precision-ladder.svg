<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t d">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t">同一个 70B 的四种精度</title>
  <desc id="d">同一个 70B 模型用四种精度各存一份大小不同：FP32 每参数 4 字节共 280GB，FP16 每参数 2 字节共 140GB，INT8 每参数 1 字节共 70GB，INT4 每参数半字节共 35GB。精度越低越省空间但越不精确。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 18px; }
    .name { font-weight: 700; font-size: 14px; }
    .calc { fill: #6b7280; font-size: 12px; }
    .gb { font-weight: 700; font-size: 15px; text-anchor: end; }
    .tag { fill: #6b7280; font-size: 11.5px; }
  </style>

  <text x="440" y="32" class="h">同一个 70B，精度不同 → 大小不同</text>

  <!-- bars: max 280GB -> width scale. base x=210, max width 520 for 280GB => 1GB ~1.857px -->
  <!-- FP32 -->
  <text x="40" y="80" class="name" fill="#991b1b">FP32</text>
  <text x="40" y="96" class="tag">4 字节</text>
  <rect x="120" y="64" width="520" height="34" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="130" y="86" class="calc">70B × 4 字节</text>
  <text x="830" y="86" class="gb" fill="#991b1b">280GB</text>

  <!-- FP16 -->
  <text x="40" y="138" class="name" fill="#9a3412">FP16/BF16</text>
  <text x="40" y="154" class="tag">2 字节</text>
  <rect x="120" y="122" width="260" height="34" rx="5" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="130" y="144" class="calc">70B × 2 字节</text>
  <text x="830" y="144" class="gb" fill="#9a3412">140GB</text>

  <!-- INT8 -->
  <text x="40" y="196" class="name" fill="#92400e">INT8</text>
  <text x="40" y="212" class="tag">1 字节</text>
  <rect x="120" y="180" width="130" height="34" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="130" y="202" class="calc">70B × 1</text>
  <text x="830" y="202" class="gb" fill="#92400e">70GB</text>

  <!-- INT4 -->
  <text x="40" y="254" class="name" fill="#166534">INT4</text>
  <text x="40" y="270" class="tag">0.5 字节</text>
  <rect x="120" y="238" width="65" height="34" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="195" y="260" class="calc">70B × 0.5</text>
  <text x="830" y="260" class="gb" fill="#166534">35GB</text>

  <!-- 底部 -->
  <rect x="40" y="290" width="800" height="22" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
  <text x="440" y="306" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12.5">同一个 70B 没有“唯一大小”——报的 GB 不同，是精度不同（越往下越省，越往下越糙）</text>
</svg>
