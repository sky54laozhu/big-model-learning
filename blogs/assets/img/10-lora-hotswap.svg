<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t d">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t">LoRA 挂载：切专家就是换补丁</title>
  <desc id="d">基座 W 共 140GB 一次性装进显存后冻结不动，上面有一个插槽。法律、医疗、代码三个约 50MB 的补丁可插拔，任意时刻只插一个，当前插着法律。切专家就是把这块 50MB 的补丁换成另一个，基座地址不动。底部提示不能同时焊上多个补丁，否则方向打架变五不像。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 18px; }
    .stage-label { fill: #ffffff; font-weight: 600; font-size: 14px; text-anchor: middle; }
    .sub { fill: #6b7280; font-size: 11.5px; text-anchor: middle; }
    .patch-t { font-weight: 700; font-size: 13px; text-anchor: middle; }
    .green-t { fill: #166534; font-weight: 600; font-size: 12.5px; text-anchor: middle; }
  </style>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <text x="440" y="32" class="h">切专家 = 换那块 50MB 补丁，基座 W 不动</text>

  <!-- 基座 W -->
  <rect x="55" y="76" width="250" height="208" rx="8" fill="#eef2f7" stroke="#94a3b8" stroke-width="2"/>
  <rect x="55" y="76" width="250" height="30" rx="8" fill="#475569"/>
  <rect x="55" y="92" width="250" height="14" fill="#475569"/>
  <text x="180" y="96" class="stage-label">基座 W　❄ 冻结</text>
  <text x="180" y="150" text-anchor="middle" fill="#334155" font-weight="700" font-size="22">140GB</text>
  <text x="180" y="178" class="sub">4096×4096 · 1677 万参数</text>
  <text x="180" y="200" class="sub">装进显存后地址不动 · 只读</text>
  <!-- 插槽 -->
  <rect x="95" y="224" width="170" height="44" rx="6" fill="#ffffff" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="180" y="251" text-anchor="middle" fill="#64748b" font-size="12.5">补丁插槽（一次一个）</text>

  <!-- 当前插着的法律补丁 + 连线 -->
  <line x1="305" y1="246" x2="360" y2="246" stroke="#16a34a" stroke-width="2.5" marker-end="url(#mk)"/>
  <rect x="362" y="224" width="120" height="44" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="422" y="244" class="patch-t" fill="#166534">法律补丁</text>
  <text x="422" y="260" class="sub">A/B · ~50MB</text>
  <text x="422" y="288" class="green-t">← 当前挂载</text>

  <!-- 切换箭头 -->
  <path d="M515 200 A 40 40 0 1 1 575 200" fill="none" stroke="#d97706" stroke-width="2.5" marker-end="url(#mk)"/>
  <text x="548" y="150" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12.5">切</text>

  <!-- 待命补丁池 -->
  <rect x="628" y="86" width="212" height="150" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="734" y="110" text-anchor="middle" fill="#92400e" font-weight="700" font-size="13">其余补丁 · 待命</text>
  <rect x="650" y="124" width="168" height="32" rx="5" fill="#ffffff" stroke="#fbbf24"/>
  <text x="734" y="145" text-anchor="middle" fill="#1a1a1a" font-size="12.5">医疗补丁　~50MB</text>
  <rect x="650" y="164" width="168" height="32" rx="5" fill="#ffffff" stroke="#fbbf24"/>
  <text x="734" y="185" text-anchor="middle" fill="#1a1a1a" font-size="12.5">代码补丁　~50MB</text>
  <rect x="650" y="204" width="168" height="22" rx="5" fill="#fffbeb"/>
  <text x="734" y="220" text-anchor="middle" class="sub">客服 · 翻译 …</text>

  <!-- 切的动作说明 -->
  <text x="548" y="246" text-anchor="middle" fill="#92400e" font-size="12">换这块</text>
  <text x="548" y="263" text-anchor="middle" fill="#92400e" font-size="12">50MB</text>

  <!-- 底部强调 -->
  <rect x="55" y="306" width="785" height="56" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="447" y="328" text-anchor="middle" fill="#991b1b" font-weight="700" font-size="13">不能把多块补丁同时焊上：各自 ΔW 指向不同方向，叠加 = 方向打架 = “五不像”</text>
  <text x="447" y="349" text-anchor="middle" fill="#991b1b" font-size="12.5">专家 = 基座 W ＋ 当前这一个补丁；切 = 换补丁，绝不叠加。</text>
</svg>
