<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t d">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t">一个请求的全链路（动画）</title>
  <desc id="d">一个请求的一生依次经过七个阶段：到达、分词、入队调度、Prefill 预填充灌缓存、Decode 逐 token 解码、结束判定 EOS、释放 KV Cache 显存槽位。高亮逐阶段流动，Decode 阶段 token 一个个流式吐出。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 17px; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.4; }
    .num { fill: #ffffff; font-weight: 700; font-size: 11px; text-anchor: middle; }
    .lab { fill: #1a2233; font-size: 11.5px; text-anchor: middle; font-weight: 600; }
    .lab2 { fill: #6b7280; font-size: 10.5px; text-anchor: middle; }
    .note { fill: #6b7280; font-size: 12px; text-anchor: middle; }
    .streamlab { fill: #166534; font-size: 12.5px; font-weight: 700; }

    .glow { fill: #f59e0b; opacity: 0; }
    @keyframes sweep {
      0% { opacity: 0; } 3% { opacity: 0.5; } 11% { opacity: 0.5; } 16% { opacity: 0; } 100% { opacity: 0; }
    }
    .g0 { animation: sweep 7s linear infinite; animation-delay: 0s; }
    .g1 { animation: sweep 7s linear infinite; animation-delay: 1s; }
    .g2 { animation: sweep 7s linear infinite; animation-delay: 2s; }
    .g3 { animation: sweep 7s linear infinite; animation-delay: 3s; }
    .g4 { animation: sweep 7s linear infinite; animation-delay: 4s; }
    .g5 { animation: sweep 7s linear infinite; animation-delay: 5s; }
    .g6 { animation: sweep 7s linear infinite; animation-delay: 6s; }

    .stok { opacity: 0; }
    @keyframes pop { 0% { opacity: 0; } 6% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
    .s0 { animation: pop 4s linear infinite; animation-delay: 0s; }
    .s1 { animation: pop 4s linear infinite; animation-delay: 0.45s; }
    .s2 { animation: pop 4s linear infinite; animation-delay: 0.9s; }
    .s3 { animation: pop 4s linear infinite; animation-delay: 1.35s; }
    .s4 { animation: pop 4s linear infinite; animation-delay: 1.8s; }
    .s5 { animation: pop 4s linear infinite; animation-delay: 2.25s; }
  </style>

  <text x="440" y="28" class="h">一个请求的一生：分词 → 排队 → Prefill → Decode → EOS → 释放</text>

  <!-- 7 stages -->
  <!-- i0 -->
  <g>
    <rect x="20" y="50" width="112" height="66" rx="8" class="box"/>
    <rect x="20" y="50" width="112" height="66" rx="8" class="glow g0"/>
    <circle cx="34" cy="64" r="9" fill="#475569"/><text x="34" y="68" class="num">1</text>
    <text x="76" y="90" class="lab">到达</text><text x="76" y="107" class="lab2">prompt 文本</text>
  </g>
  <!-- i1 -->
  <g>
    <rect x="140" y="50" width="112" height="66" rx="8" class="box"/>
    <rect x="140" y="50" width="112" height="66" rx="8" class="glow g1"/>
    <circle cx="154" cy="64" r="9" fill="#475569"/><text x="154" y="68" class="num">2</text>
    <text x="196" y="90" class="lab">分词</text><text x="196" y="107" class="lab2">→ token 序列</text>
  </g>
  <!-- i2 -->
  <g>
    <rect x="260" y="50" width="112" height="66" rx="8" class="box"/>
    <rect x="260" y="50" width="112" height="66" rx="8" class="glow g2"/>
    <circle cx="274" cy="64" r="9" fill="#475569"/><text x="274" y="68" class="num">3</text>
    <text x="316" y="90" class="lab">入队 · 调度</text><text x="316" y="107" class="lab2">连续批处理</text>
  </g>
  <!-- i3 -->
  <g>
    <rect x="380" y="50" width="112" height="66" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4"/>
    <rect x="380" y="50" width="112" height="66" rx="8" class="glow g3"/>
    <circle cx="394" cy="64" r="9" fill="#991b1b"/><text x="394" y="68" class="num">4</text>
    <text x="436" y="90" class="lab" fill="#991b1b">Prefill</text><text x="436" y="107" class="lab2">灌满缓存·慢</text>
  </g>
  <!-- i4 -->
  <g>
    <rect x="500" y="50" width="112" height="66" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
    <rect x="500" y="50" width="112" height="66" rx="8" class="glow g4"/>
    <circle cx="514" cy="64" r="9" fill="#166534"/><text x="514" y="68" class="num">5</text>
    <text x="556" y="90" class="lab" fill="#166534">Decode</text><text x="556" y="107" class="lab2">逐 token·快</text>
  </g>
  <!-- i5 -->
  <g>
    <rect x="620" y="50" width="112" height="66" rx="8" class="box"/>
    <rect x="620" y="50" width="112" height="66" rx="8" class="glow g5"/>
    <circle cx="634" cy="64" r="9" fill="#475569"/><text x="634" y="68" class="num">6</text>
    <text x="676" y="90" class="lab">结束判定</text><text x="676" y="107" class="lab2">命中 EOS</text>
  </g>
  <!-- i6 -->
  <g>
    <rect x="740" y="50" width="112" height="66" rx="8" class="box"/>
    <rect x="740" y="50" width="112" height="66" rx="8" class="glow g6"/>
    <circle cx="754" cy="64" r="9" fill="#475569"/><text x="754" y="68" class="num">7</text>
    <text x="796" y="90" class="lab">释放</text><text x="796" y="107" class="lab2">回收显存槽位</text>
  </g>

  <!-- arrows between -->
  <g fill="#cbd5e1">
    <path d="M132,83 l8,-5 0,10 z"/><path d="M252,83 l8,-5 0,10 z"/><path d="M372,83 l8,-5 0,10 z"/>
    <path d="M492,83 l8,-5 0,10 z"/><path d="M612,83 l8,-5 0,10 z"/><path d="M732,83 l8,-5 0,10 z"/>
  </g>

  <!-- Decode 流式输出演示 -->
  <rect x="20" y="150" width="832" height="74" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
  <text x="40" y="178" class="streamlab" text-anchor="start">⑤ Decode 逐 token 流式吐出：</text>
  <g>
    <g class="stok s0"><rect x="270" y="182" width="48" height="26" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="294" y="200" class="lab" fill="#166534">tok1</text></g>
    <g class="stok s1"><rect x="330" y="182" width="48" height="26" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="354" y="200" class="lab" fill="#166534">tok2</text></g>
    <g class="stok s2"><rect x="390" y="182" width="48" height="26" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="414" y="200" class="lab" fill="#166534">tok3</text></g>
    <g class="stok s3"><rect x="450" y="182" width="48" height="26" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="474" y="200" class="lab" fill="#166534">tok4</text></g>
    <g class="stok s4"><rect x="510" y="182" width="48" height="26" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="534" y="200" class="lab" fill="#166534">tok5</text></g>
    <g class="stok s5"><rect x="570" y="182" width="48" height="26" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="594" y="200" class="lab" fill="#166534">tok6</text></g>
    <text x="636" y="200" class="note" text-anchor="start">→ … 直到 EOS</text>
  </g>

  <!-- 底部 -->
  <rect x="20" y="240" width="832" height="44" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="436" y="262" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12.5">KV Cache 贯穿始终：④建立 → ⑤增长 → ⑦释放；连续批处理在外调度一批请求的生死</text>
  <text x="436" y="279" text-anchor="middle" fill="#92400e" font-size="11.5">（高亮逐阶段流动，Decode 处 token 一个个吐出）</text>
</svg>
