<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t d">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t">低秩分解 ΔW ≈ A × B</title>
  <desc id="d">巨大的微调改动量 ΔW 是 4096 乘 4096 共一千六百七十七万个数，因为它低秩，可以拆成一块 4096 乘 8 的瘦高矩阵 A 和一块 8 乘 4096 的扁矩阵 B 相乘，参数量只剩六万五千，省到原来的百分之零点四。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 18px; }
    .lab { fill: #1a1a1a; font-weight: 700; font-size: 15px; text-anchor: middle; }
    .dim { fill: #6b7280; font-size: 12px; text-anchor: middle; }
    .cap { fill: #2a2a2a; font-size: 12.5px; text-anchor: middle; }
    .op  { fill: #1a1a1a; font-size: 26px; font-weight: 700; text-anchor: middle; }
  </style>

  <text x="440" y="32" class="h">低秩分解：把大矩阵拆成两块瘦矩阵</text>

  <!-- ΔW 大方块 -->
  <rect x="70" y="78" width="150" height="150" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="145" y="160" class="lab" fill="#991b1b">ΔW</text>
  <text x="145" y="250" class="dim">4096 × 4096</text>
  <text x="145" y="270" class="cap" fill="#991b1b" font-weight="700">1677 万个数</text>
  <text x="145" y="290" class="dim">庞大、但低秩</text>

  <!-- ≈ -->
  <text x="262" y="162" class="op">≈</text>

  <!-- A 瘦高 -->
  <rect x="318" y="78" width="36" height="150" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="336" y="160" class="lab" fill="#1e40af">A</text>
  <text x="336" y="250" class="dim">4096 × 8</text>
  <text x="336" y="270" class="cap" fill="#1e40af">“8 个方向”</text>

  <!-- × -->
  <text x="398" y="162" class="op">×</text>

  <!-- B 扁平 -->
  <rect x="438" y="120" width="150" height="36" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="513" y="144" class="lab" fill="#166534">B</text>
  <text x="513" y="250" class="dim">8 × 4096</text>
  <text x="513" y="270" class="cap" fill="#166534">“怎么组合回 4096 行”</text>

  <!-- 等式右侧 账单 -->
  <rect x="628" y="92" width="212" height="124" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="734" y="116" text-anchor="middle" fill="#166534" font-weight="700" font-size="13">参数量对比</text>
  <text x="734" y="142" text-anchor="middle" class="cap">全量　1677 万</text>
  <text x="734" y="166" text-anchor="middle" class="cap">LoRA　4096×8 + 8×4096</text>
  <text x="734" y="186" text-anchor="middle" fill="#166534" font-weight="700" font-size="14">≈ 6.5 万</text>
  <text x="734" y="207" text-anchor="middle" fill="#166534" font-weight="700" font-size="13">省到 0.4%</text>

  <!-- r 说明条 -->
  <rect x="70" y="306" width="770" height="42" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="455" y="332" text-anchor="middle" fill="#92400e" font-weight="700" font-size="13">那个 8 就是你选的秩 r —— 你赌 ΔW 的真实方向数不超过 8，只给它 8 个方向的额度</text>
</svg>
