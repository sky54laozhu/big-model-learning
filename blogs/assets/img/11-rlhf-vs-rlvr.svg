<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t d">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t">RLHF vs RLVR</title>
  <desc id="d">两条路线共用同一个强化学习循环，区别只在打分器。RLHF 用奖励模型，适合写作对话等没有客观对错的任务，分来自人类偏好，软肋是可能被钻空子。RLVR 用自动验证器，适合数学代码等有客观对错的任务，分由规则当场算出，软肋是只能用于可验证任务。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 18px; }
    .stage-label { fill: #ffffff; font-weight: 600; font-size: 14px; text-anchor: middle; }
    .k { fill: #6b7280; font-size: 12px; }
    .blue-t { fill: #1e40af; font-size: 12.5px; }
    .green-t { fill: #166534; font-size: 12.5px; }
    .body { fill: #2a2a2a; font-size: 12.5px; }
  </style>

  <text x="440" y="30" class="h">同一个强化学习循环，只换“打分器”</text>
  <text x="440" y="52" text-anchor="middle" class="k">生成 → 打分 → 强化高分 → 再生成</text>

  <!-- 左 RLHF -->
  <rect x="40" y="66" width="370" height="216" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="40" y="66" width="370" height="30" rx="8" fill="#1e40af"/>
  <rect x="40" y="82" width="370" height="14" fill="#1e40af"/>
  <text x="225" y="86" class="stage-label">RLHF · 打分器 = 奖励模型</text>

  <text x="60" y="124" class="k">适用</text>
  <text x="120" y="124" class="body">没有客观对错（写作/对话/安慰）</text>
  <text x="60" y="156" class="k">打分</text>
  <text x="120" y="156" class="blue-t" font-weight="600">奖励模型（模仿人的偏好）</text>
  <text x="60" y="188" class="k">分从哪来</text>
  <text x="145" y="188" class="body">人类偏好数据训出来</text>
  <line x1="60" y1="208" x2="390" y2="208" stroke="#bfdbfe" stroke-width="1"/>
  <text x="60" y="232" class="k">软肋</text>
  <text x="120" y="232" class="blue-t" font-weight="600">可能被钻空子（reward hacking）</text>
  <text x="225" y="266" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="12.5">分是“学”来的（赝品裁判）</text>

  <!-- 右 RLVR -->
  <rect x="470" y="66" width="370" height="216" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="470" y="66" width="370" height="30" rx="8" fill="#166534"/>
  <rect x="470" y="82" width="370" height="14" fill="#166534"/>
  <text x="655" y="86" class="stage-label">RLVR · 打分器 = 验证器</text>

  <text x="490" y="124" class="k">适用</text>
  <text x="550" y="124" class="body">有客观对错（数学/代码/逻辑）</text>
  <text x="490" y="156" class="k">打分</text>
  <text x="550" y="156" class="green-t" font-weight="600">验证器（规则 / 跑测试）</text>
  <text x="490" y="188" class="k">分从哪来</text>
  <text x="575" y="188" class="body">答案对错，当场算出</text>
  <line x1="490" y1="208" x2="820" y2="208" stroke="#bbf7d0" stroke-width="1"/>
  <text x="490" y="232" class="k">软肋</text>
  <text x="550" y="232" class="green-t" font-weight="600">限可验证任务；规则也可能被钻空子</text>
  <text x="655" y="266" text-anchor="middle" fill="#166534" font-weight="700" font-size="12.5">分是“算”出来的（更难被讨好）</text>

  <!-- 底部 -->
  <rect x="40" y="298" width="800" height="34" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="440" y="320" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12.5">区别只在：打分器是“学来的奖励模型” 还是 “算出来的验证器”</text>
</svg>
