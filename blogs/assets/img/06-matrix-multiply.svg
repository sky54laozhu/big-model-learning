<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t3 d3">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t3">矩阵乘法 = 向量变换函数</title>
  <desc id="d3">矩阵乘法的本质：输入一个向量，通过参数矩阵，输出一个新向量。每个输出就是输入和矩阵某一行的点积。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .box { rx: 8; }
    .label { font-size: 12px; text-anchor: middle; }
    .label-b { font-size: 13px; text-anchor: middle; font-weight: 600; }
    .num { font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; }
    .arrow { fill: none; stroke: #5a5a5a; stroke-width: 1.5; marker-end: url(#mk); }
    .note { fill: #6b7280; font-size: 11px; text-anchor: middle; }
  </style>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <text x="390" y="30" class="h">矩阵乘法 = 向量变换函数</text>

  <!-- Input vector -->
  <rect x="40" y="80" width="140" height="80" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="110" y="104" class="label-b" fill="#1d4ed8">输入向量</text>
  <text x="110" y="130" class="num" fill="#3b82f6" text-anchor="middle">[3, 1]</text>
  <text x="110" y="148" class="note">token 的原始向量</text>

  <!-- Arrow -->
  <path d="M180,120 L230,120" class="arrow"/>

  <!-- W matrix -->
  <rect x="240" y="60" width="180" height="120" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="330" y="84" class="label-b" fill="#92400e">参数矩阵 W</text>
  <text x="330" y="112" class="num" fill="#d97706" text-anchor="middle">[0.5, 0.8]  ← 第一行</text>
  <text x="330" y="132" class="num" fill="#d97706" text-anchor="middle">[0.2, 0.6]  ← 第二行</text>
  <text x="330" y="168" class="note">训练学出来的参数</text>

  <!-- Arrow -->
  <path d="M420,120 L470,120" class="arrow"/>

  <!-- Output vector -->
  <rect x="480" y="80" width="140" height="80" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="550" y="104" class="label-b" fill="#6d28d9">输出向量</text>
  <text x="550" y="130" class="num" fill="#8b5cf6" text-anchor="middle">[2.3, 1.2]</text>
  <text x="550" y="148" class="note">变换后的新向量</text>

  <!-- Calculation detail -->
  <rect x="120" y="210" width="540" height="100" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="390" y="236" class="label-b" fill="#1a1a1a">计算过程：每个输出 = 输入和矩阵某行的点积</text>

  <text x="160" y="264" class="num" fill="#8b5cf6" text-anchor="start">output[0]</text>
  <text x="260" y="264" class="num" fill="#1a1a1a" text-anchor="start">= dot([3,1], [0.5,0.8])</text>
  <text x="500" y="264" class="num" fill="#1a1a1a" text-anchor="start">= 3×0.5 + 1×0.8</text>
  <text x="610" y="264" class="num" fill="#8b5cf6" text-anchor="start">= 2.3</text>

  <text x="160" y="288" class="num" fill="#8b5cf6" text-anchor="start">output[1]</text>
  <text x="260" y="288" class="num" fill="#1a1a1a" text-anchor="start">= dot([3,1], [0.2,0.6])</text>
  <text x="500" y="288" class="num" fill="#1a1a1a" text-anchor="start">= 3×0.2 + 1×0.6</text>
  <text x="610" y="288" class="num" fill="#8b5cf6" text-anchor="start">= 1.2</text>

  <!-- Equals function -->
  <rect x="680" y="88" width="80" height="64" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="720" y="114" fill="#475569" font-size="11" text-anchor="middle" font-weight="600">= function</text>
  <text x="720" y="132" fill="#475569" font-size="11" text-anchor="middle">(input, W)</text>

  <!-- Bottom -->
  <rect x="140" y="322" width="500" height="10" rx="2" fill="#fff"/>
</svg>
