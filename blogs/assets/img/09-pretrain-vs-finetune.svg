<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t d">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t">预训练 vs 微调 两步对照</title>
  <desc id="d">左栏预训练用整个互联网做自监督学习，学到知识与推理；右栏微调 SFT 用几千到几万条人工示范做监督学习，学到服从与格式。底部强调微调只是在博学的模型上轻轻拨方向。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 18px; }
    .h2 { font-weight: 600; fill: #1a2233; font-size: 13px; }
    .row-k { fill: #6b7280; font-size: 12px; }
    .blue-t { fill: #1e40af; font-size: 12px; }
    .green-t { fill: #166534; font-size: 12px; }
    .content { fill: #2a2a2a; font-size: 12px; }
    .stage-label { fill: #ffffff; font-weight: 600; font-size: 14px; text-anchor: middle; }
    .note { fill: #6b7280; font-size: 12px; text-anchor: middle; }
    .arrow { fill: none; stroke: #5a5a5a; stroke-width: 2; marker-end: url(#mk); }
  </style>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <text x="440" y="34" class="h">预训练学“知识”，微调学“听话”</text>

  <!-- 左栏 预训练 -->
  <rect x="40" y="58" width="370" height="190" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="40" y="58" width="370" height="30" rx="8" fill="#1e40af"/>
  <rect x="40" y="74" width="370" height="14" fill="#1e40af"/>
  <text x="225" y="78" class="stage-label">第一步 · 预训练 (Pretrain)</text>

  <text x="60" y="116" class="row-k">数据</text>
  <text x="110" y="116" class="content">整个互联网 · 自监督</text>
  <text x="60" y="148" class="row-k">量级</text>
  <text x="110" y="148" class="blue-t" font-weight="600">万亿 token</text>
  <text x="60" y="180" class="row-k">学到</text>
  <text x="110" y="180" class="content">知识 + 推理能力</text>
  <line x1="60" y1="200" x2="390" y2="200" stroke="#bfdbfe" stroke-width="1"/>
  <text x="60" y="224" class="blue-t" font-weight="600">本质：学世界长什么样</text>

  <!-- 箭头 -->
  <line x1="416" y1="153" x2="464" y2="153" class="arrow"/>

  <!-- 右栏 微调 SFT -->
  <rect x="470" y="58" width="370" height="190" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="470" y="58" width="370" height="30" rx="8" fill="#166534"/>
  <rect x="470" y="74" width="370" height="14" fill="#166534"/>
  <text x="655" y="78" class="stage-label">第二步 · 微调 (SFT)</text>

  <text x="490" y="116" class="row-k">数据</text>
  <text x="540" y="116" class="content">人工精写(指令→回答) · 监督</text>
  <text x="490" y="148" class="row-k">量级</text>
  <text x="540" y="148" class="green-t" font-weight="600">几千 ~ 几万条</text>
  <text x="490" y="180" class="row-k">学到</text>
  <text x="540" y="180" class="content">服从 / 行为 / 格式</text>
  <line x1="490" y1="200" x2="820" y2="200" stroke="#bbf7d0" stroke-width="1"/>
  <text x="490" y="224" class="green-t" font-weight="600">本质：学怎么回应人</text>

  <!-- 底部强调条 -->
  <rect x="40" y="270" width="800" height="58" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="440" y="293" text-anchor="middle" fill="#92400e" font-weight="700" font-size="13">为什么微调只要几千条就够？</text>
  <text x="440" y="315" text-anchor="middle" fill="#92400e" font-size="12.5">不是学新知识，只是在满腹经纶的模型上“轻轻拨一下方向”。</text>

  <line x1="40" y1="344" x2="840" y2="344" stroke="#e2e8f0" stroke-width="1"/>
  <text x="440" y="356" class="note">预训练打底，微调定调 —— 同一个模型，两种目标。</text>
</svg>
