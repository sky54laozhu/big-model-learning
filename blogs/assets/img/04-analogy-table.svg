<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t4 d4">
  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>
  <title id="t4">Q/K/V 类比</title>
  <desc id="d4">用聚会找人、数据库查询、搜索引擎三个类比解释 Q/K/V 的角色。</desc>
  <style>
    .col-head { fill: #fff; font-weight: 600; font-size: 13px; text-anchor: middle; }
    .row-head { fill: #1a1a1a; font-weight: 600; font-size: 13px; }
    .cell { font-size: 12px; fill: #2a2a2a; text-anchor: middle; }
    .grid { stroke: #d0d3d8; stroke-width: 1; }
    .row-a { fill: #f6f7f9; }
    .row-b { fill: #ffffff; }
    .note { fill: #6b7280; font-size: 11px; text-anchor: middle; }
  </style>

  <!-- Header -->
  <rect x="40" y="20" width="800" height="44" fill="#1a2233" rx="4"/>
  <text x="140" y="47" class="col-head">类比</text>
  <text x="340" y="47" class="col-head">Query（查询）</text>
  <text x="540" y="47" class="col-head">Key（键）</text>
  <text x="740" y="47" class="col-head">Value（值）</text>

  <!-- Dividers -->
  <line x1="240" y1="64" x2="240" y2="240" class="grid"/>
  <line x1="440" y1="64" x2="440" y2="240" class="grid"/>
  <line x1="640" y1="64" x2="640" y2="240" class="grid"/>

  <!-- Row 1: Party -->
  <rect x="40" y="64" width="800" height="44" class="row-a"/>
  <text x="140" y="91" class="row-head">聚会找人</text>
  <text x="340" y="91" class="cell">你的需求</text>
  <text x="540" y="91" class="cell">别人的名牌</text>
  <text x="740" y="91" class="cell">别人能聊的内容</text>

  <!-- Row 2: Database -->
  <rect x="40" y="108" width="800" height="44" class="row-b"/>
  <text x="140" y="135" class="row-head">数据库查询</text>
  <text x="340" y="135" class="cell">WHERE 条件</text>
  <text x="540" y="135" class="cell">索引列</text>
  <text x="740" y="135" class="cell">SELECT 返回的数据</text>

  <!-- Row 3: Search engine -->
  <rect x="40" y="152" width="800" height="44" class="row-a"/>
  <text x="140" y="179" class="row-head">搜索引擎</text>
  <text x="340" y="179" class="cell">你输入的关键词</text>
  <text x="540" y="179" class="cell">网页的标题和摘要</text>
  <text x="740" y="179" class="cell">网页的正文内容</text>

  <!-- Row 4: Attention -->
  <rect x="40" y="196" width="800" height="44" fill="#eff6ff"/>
  <text x="140" y="223" class="row-head" fill="#1d4ed8">Attention</text>
  <text x="340" y="223" class="cell" fill="#1d4ed8">"我在找什么关系"</text>
  <text x="540" y="223" class="cell" fill="#1d4ed8">"我能提供什么匹配"</text>
  <text x="740" y="223" class="cell" fill="#1d4ed8">"匹配后传递的信息"</text>

  <!-- Border -->
  <rect x="40" y="20" width="800" height="220" fill="none" stroke="#1a2233" stroke-width="2" rx="4"/>

  <!-- Bottom note -->
  <text x="440" y="268" class="note" fill="#475569">Q 和 K 决定"关注谁"（算权重） ｜ V 决定"拿到什么"（被加权求和）</text>
</svg>
