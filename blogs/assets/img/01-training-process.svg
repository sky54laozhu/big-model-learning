<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="13" role="img" aria-labelledby="t4 d4">
  <title id="t4">训练过程：从瞎猜到准确预测</title>
  <desc id="d4">展示大模型训练的核心循环：输入文本 → 模型预测 → 对比正确答案 → 调整参数 → 重复万亿次。下方用曲线展示训练过程中预测准确度的提升。</desc>
  <style>
    .h { font-weight: 700; fill: #1a1a1a; text-anchor: middle; font-size: 16px; }
    .box { fill: #fff; stroke: #1a2233; stroke-width: 1.5; rx: 8; }
    .box-red { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.5; rx: 8; }
    .box-green { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; rx: 8; }
    .box-blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
    .box-amber { fill: #fffbeb; stroke: #d97706; stroke-width: 1.5; rx: 8; }
    .model-box { fill: #1a2233; rx: 8; }
    .lbl { fill: #1a1a1a; text-anchor: middle; font-size: 13px; }
    .lbl-b { fill: #1a1a1a; text-anchor: middle; font-size: 13px; font-weight: 600; }
    .arrow { fill: none; stroke: #5a5a5a; stroke-width: 1.5; marker-end: url(#mk); }
    .arrow-red { fill: none; stroke: #dc2626; stroke-width: 2; marker-end: url(#mk-r); }
    .note { fill: #6b7280; font-size: 11px; text-anchor: middle; }
    .good { fill: #16a34a; font-weight: 600; }
    .bad { fill: #dc2626; font-weight: 600; }
    .curve { fill: none; stroke: #3b82f6; stroke-width: 2.5; }
    .axis { stroke: #94a3b8; stroke-width: 1; }
    .axis-label { fill: #64748b; font-size: 11px; }
  </style>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/>
    </marker>
    <marker id="mk-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="mk-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
  </defs>

  <text x="440" y="30" class="h">训练 = 猜错 → 纠正 → 再猜，重复万亿次</text>

  <!-- Step 1: Input -->
  <rect x="30" y="55" width="180" height="70" class="box"/>
  <text x="120" y="82" class="lbl-b">训练文本</text>
  <text x="120" y="102" class="lbl">从前有座山山上有座<tspan font-weight="700">庙</tspan></text>

  <!-- Arrow to mask -->
  <path d="M210,90 L250,90" class="arrow"/>

  <!-- Step 2: Mask -->
  <rect x="250" y="55" width="180" height="70" class="box-blue"/>
  <text x="340" y="78" class="lbl-b">遮住最后一个字</text>
  <text x="340" y="102" class="lbl">从前有座山山上有座<tspan class="bad">___</tspan></text>

  <!-- Arrow to model -->
  <path d="M430,90 L470,90" class="arrow"/>

  <!-- Step 3: Model predicts -->
  <rect x="470" y="65" width="80" height="50" class="model-box"/>
  <text x="510" y="96" fill="#fff" font-weight="600" text-anchor="middle">LLM</text>

  <!-- Arrow to prediction -->
  <path d="M550,90 L590,90" class="arrow"/>

  <!-- Step 4: Prediction result -->
  <rect x="590" y="55" width="250" height="70" class="box-red"/>
  <text x="715" y="78" class="lbl-b">模型预测（一开始是瞎猜）</text>
  <text x="715" y="102" class="lbl">庙:<tspan class="bad">1%</tspan>  楼:<tspan class="bad">3%</tspan>  人:<tspan class="bad">5%</tspan>  的:<tspan class="bad">8%</tspan></text>

  <!-- Arrow down to compare -->
  <path d="M715,125 L715,155" class="arrow"/>

  <!-- Step 5: Compare -->
  <rect x="540" y="155" width="300" height="60" class="box-amber"/>
  <text x="690" y="178" class="lbl-b">对比正确答案</text>
  <text x="690" y="198" class="lbl">正确是"庙"，但模型只给了 <tspan class="bad">1%</tspan> → 差距很大！</text>

  <!-- Arrow down to adjust -->
  <path d="M690,215 L690,245" class="arrow-red"/>

  <!-- Step 6: Adjust -->
  <rect x="540" y="245" width="300" height="50" class="box-green"/>
  <text x="690" y="276" class="lbl-b good">微调参数，让 "庙" 的概率更高</text>

  <!-- Loop arrow back -->
  <path d="M690,295 Q690,320 440,320 Q120,320 120,145 L120,125" stroke="#d97706" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#mk-loop)"/>
  <text x="440" y="340" fill="#d97706" font-weight="600" font-size="13" text-anchor="middle">换下一段文本，重复以上过程（万亿次）</text>

  <!-- Training curve below -->
  <rect x="80" y="365" width="720" height="140" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>

  <!-- Y axis -->
  <line x1="130" y1="385" x2="130" y2="490" class="axis"/>
  <text x="118" y="395" class="axis-label" text-anchor="end">高</text>
  <text x="118" y="490" class="axis-label" text-anchor="end">低</text>
  <text x="80" y="440" class="axis-label" text-anchor="middle" transform="rotate(-90, 80, 440)">预测准确度</text>

  <!-- X axis -->
  <line x1="130" y1="490" x2="760" y2="490" class="axis"/>
  <text x="200" y="505" class="axis-label" text-anchor="middle">开始</text>
  <text x="760" y="505" class="axis-label" text-anchor="middle">万亿次迭代</text>

  <!-- Curve: starts low, rises steeply then plateaus -->
  <path d="M140,485 Q200,480 250,460 Q320,430 400,415 Q480,400 550,395 Q620,392 700,390 L750,389" class="curve"/>

  <!-- Annotation dots -->
  <circle cx="160" cy="483" r="4" fill="#dc2626"/>
  <text x="160" y="478" fill="#dc2626" font-size="10" text-anchor="middle" font-weight="600">瞎猜</text>

  <circle cx="400" cy="415" r="4" fill="#d97706"/>
  <text x="400" y="408" fill="#d97706" font-size="10" text-anchor="middle" font-weight="600">越来越准</text>

  <circle cx="750" cy="389" r="4" fill="#16a34a"/>
  <text x="750" y="382" fill="#16a34a" font-size="10" text-anchor="middle" font-weight="600">训练完成</text>
</svg>
